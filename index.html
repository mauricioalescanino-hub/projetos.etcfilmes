const parseAnalise = (txt) => {
  const s = {};
  const sec = (from, to) => {
    const re = new RegExp("## " + from + "\\.(.*?)(?=\\n## " + to + "\\.|$)", "s");
    const m = txt.match(re);
    if (!m) return "";
    return m[0].replace(new RegExp("^## " + from + "\\..*\\n"), "").trim();
  };
  const r1 = sec("1","2");
  s.ideiaFrase   = (r1.match(/\*\*Ideia em 1 frase:\*\* (.+)/) || [])[1] || "";
  s.viabilidade  = (r1.match(/\*\*Viabilidade:\*\* ([^-\n]+)/) || [])[1]?.trim() || "";
  s.complexidade = (r1.match(/\*\*Complexidade:\*\* (.+)/) || [])[1] || "";
  s.tempo        = (r1.match(/\*\*Tempo estimado:\*\* (.+)/) || [])[1] || "";
  s.custo        = (r1.match(/\*\*Custo estimado:\*\* (.+)/) || [])[1] || "";
  s.roi          = (r1.match(/\*\*ROI esperado:\*\* (.+)/) || [])[1] || "";
  const r2 = sec("2","3");
  s.okrConexao   = (r2.match(/\*\*Conex[aã]o:\*\* (.+)/) || [])[1] || "";
  s.problema = sec("3","4"); s.solucao = sec("4","5"); s.stack = sec("5","6");
  s.roadmap = sec("6","7"); s.estimativas = sec("7","8"); s.riscos = sec("8","9");
  const m9 = txt.match(/## 9\.([\s\S]*?)(?=### RECOMENDA|$)/);
  s.proximosPassos  = m9 ? m9[1].trim() : "";
  s.recomendacao    = (txt.match(/### RECOMENDA[CÇ][AÃ]O FINAL\s*\*\*(.+?)\*\*/) || [])[1] || "";
  s.recomendacaoDesc= (txt.match(/### RECOMENDA[CÇ][AÃ]O FINAL\s*\*\*.+?\*\* - (.+)/) || [])[1] || "";
  const fm = txt.match(/### RESUMO PARA SUBMISS[AÃ]O AO FORMS\n([\s\S]+)$/);
  s.resumoForms = fm ? fm[1].trim() : ((txt.match(/(IDEIA:[\s\S]+RECOMENDA[CÇ][AÃ]O DA SKILL:.+)/) || [])[1] || "");
  return s;
};

/* ─── SUPABASE ───────────────────────────────────────────── */
const supa = async (path, opts={}) => {
  const {method="GET", body, prefer} = opts;
  const headers = {"apikey":SKEY,"Authorization":"Bearer "+SKEY,"Content-Type":"application/json"};
  if (prefer) headers["Prefer"] = prefer;
  const res = await fetch(SURL+"/rest/v1/"+path, {method, headers, body: body ? JSON.stringify(body) : undefined});
  if (!res.ok) { const t = await res.text().catch(()=>res.status.toString()); throw new Error(t.substring(0,200)); }
  const t = await res.text();
  return t ? JSON.parse(t) : null;
};

function ComentariosTab({ detail, patch, membros }) {
  const comentarios = detail.comentarios || [];
  const [autor,     setAutor]     = useState("");
  const [texto,     setTexto]     = useState("");
  const [saving,    setSaving]    = useState(false);
  const [editId,    setEditId]    = useState(null);
  const [editTexto, setEditTexto] = useState("");
  const [expandido, setExpandido] = useState(null);

  const fmt = (iso) => {
    const d = new Date(iso);
    return d.toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit",year:"2-digit"})
      + " " + d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
  };

  const enviar = async () => {
    if (!texto.trim() || !autor) return;
    setSaving(true);
    const novo = { id:Date.now().toString(), autor, texto:texto.trim(), data:new Date().toISOString() };
    await patch(detail.id, { comentarios:[...comentarios, novo] });
    setTexto(""); setSaving(false);
  };

  const salvarEdicao = async (cid) => {
    if (!editTexto.trim()) return;
    setSaving(true);
    const novos = comentarios.map(c => c.id===cid ? {...c, texto:editTexto.trim(), editado:new Date().toISOString()} : c);
    await patch(detail.id, { comentarios: novos });
    setEditId(null); setEditTexto(""); setSaving(false);
  };

  const excluir = async (cid) => {
    if (!confirm("Excluir este comentário?")) return;
    await patch(detail.id, { comentarios: comentarios.filter(c=>c.id!==cid) });
  };

  const BtnAcao = ({onClick, color="#C0C4CC", hoverColor, children}) => html`
    <button onClick=${onClick}
      style=${"background:none;border:none;cursor:pointer;color:"+color+";padding:2px;display:flex;align-items:center"}
      onMouseEnter=${e=>e.currentTarget.style.color=hoverColor||color}
      onMouseLeave=${e=>e.currentTarget.style.color=color}>
      ${children}
    </button>`;

  return html`
    <div style="display:flex;flex-direction:column;gap:16px">

      <!-- lista comentários da iniciativa -->
      ${comentarios.length===0 ? html`
        <div style="text-align:center;padding:32px 0;color:#9193A0">
          <p style="font-size:28px;margin:0 0 8px">💬</p>
          <p style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;font-size:14px;color:#4A4A4A;margin:0 0 4px">Nenhum comentário ainda</p>
          <p style="font-size:12px;margin:0">Seja o primeiro a comentar sobre esta iniciativa.</p>
        </div>` : html`
        <div style="display:flex;flex-direction:column;gap:8px">
          ${comentarios.map(c=>html`
            <div key=${c.id} style="display:flex;gap:10px;padding:12px;background:#F7F9FC;border:1px solid #E8ECF1;border-radius:10px">
              <div style="width:32px;height:32px;border-radius:50%;background:#E5F6FB;display:flex;align-items:center;justify-content:center;flex-shrink:0">
                <span style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:13px;color:#009FCF">${(c.autor||"?").charAt(0).toUpperCase()}</span>
              </div>
              <div style="flex:1;min-width:0">
                <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:4px;flex-wrap:wrap">
                  <span style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:12px;color:#1C1C1C">${c.autor}</span>
                  <span style="font-size:10px;color:#C0C4CC">${fmt(c.data)}</span>
                  ${c.editado ? html`<span style="font-size:9px;color:#C0C4CC;font-style:italic">editado</span>` : null}
                </div>
                ${editId===c.id ? html`
                  <div style="display:flex;flex-direction:column;gap:6px">
                    <textarea value=${editTexto}
                      onChange=${e=>setEditTexto(e.target.value)}
                      onKeyDown=${e=>{ if(e.key==="Enter"&&(e.metaKey||e.ctrlKey)) salvarEdicao(c.id); }}
                      rows="2"
                      style="width:100%;padding:8px 10px;background:#fff;border:1px solid #009FCF;border-radius:8px;color:#1C1C1C;font-size:13px;outline:none;resize:none;font-family:'Inter',sans-serif;box-sizing:border-box"></textarea>
                    <div style="display:flex;gap:6px">

function EtapaComentarios({ e, membros, onSave }) {
  const comentarios = e.comentarios || [];
  const [autor,     setAutor]     = useState("");
  const [texto,     setTexto]     = useState("");
  const [saving,    setSaving]    = useState(false);
  const [editId,    setEditId]    = useState(null);
  const [editTexto, setEditTexto] = useState("");

  const fmt = (iso) => {
    const d = new Date(iso);
    return d.toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit",year:"2-digit"})
      + " " + d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
  };

  const enviar = async () => {
    if (!texto.trim() || !autor) return;
    setSaving(true);
    const novo = { id:Date.now().toString(), autor, texto:texto.trim(), data:new Date().toISOString() };
    await onSave([...comentarios, novo]);
    setTexto(""); setSaving(false);
  };

  const salvarEdicao = async (cid) => {
    if (!editTexto.trim()) return;
    setSaving(true);
    await onSave(comentarios.map(c=>c.id===cid?{...c,texto:editTexto.trim(),editado:new Date().toISOString()}:c));
    setEditId(null); setEditTexto(""); setSaving(false);
  };

  const excluir = async (cid) => {
    if (!confirm("Excluir comentário?")) return;
    await onSave(comentarios.filter(c=>c.id!==cid));
  };

  return html`
    <div style="margin-top:8px;padding:10px 12px;background:#FFFBEB;border:1px solid #FDE68A;border-radius:8px;display:flex;flex-direction:column;gap:8px">
      <p style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:10px;color:#D97706;text-transform:uppercase;letter-spacing:.08em;margin:0">

      ${comentarios.length>0 ? html`
        <div style="display:flex;flex-direction:column;gap:6px">
          ${comentarios.map(c=>html`
            <div key=${c.id} style="display:flex;gap:7px">
              <div style="width:22px;height:22px;border-radius:50%;background:#FEF9C3;border:1px solid #FDE68A;display:flex;align-items:center;justify-content:center;flex-shrink:0">
                <span style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:9px;color:#D97706">${(c.autor||"?").charAt(0).toUpperCase()}</span>
              </div>
              <div style="flex:1;min-width:0">
                <div style="display:flex;gap:6px;align-items:center;margin-bottom:2px;flex-wrap:wrap">
                  <span style="font-weight:700;font-size:11px;color:#1C1C1C">${c.autor}</span>
                  <span style="font-size:9px;color:#C0C4CC">${fmt(c.data)}</span>
                  ${c.editado?html`<span style="font-size:9px;color:#C0C4CC;font-style:italic">editado</span>`:null}
                  <div style="margin-left:auto;display:flex;gap:2px">
                    ${editId!==c.id ? html`
                      <button onClick=${()=>{ setEditId(c.id); setEditTexto(c.texto); }}
                        style="background:none;border:none;cursor:pointer;color:#C0C4CC;padding:1px"
                        onMouseEnter=${ev=>ev.currentTarget.style.color="#009FCF"}
                        onMouseLeave=${ev=>ev.currentTarget.style.color="#C0C4CC"}>
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                      </button>
                      <button onClick=${()=>excluir(c.id)}
                        style="background:none;border:none;cursor:pointer;color:#C0C4CC;padding:1px"

                ${editId===c.id ? html`

                      onChange=${ev=>setEditTexto(ev.target.value)}

      <div style="display:flex;gap:6px">

          </select>` : html`
          <input type="text" value=${autor} onChange=${ev=>setAutor(ev.target.value)}
            placeholder="Seu nome"
            style="padding:6px 8px;background:#fff;border:1px solid #FDE68A;border-radius:8px;font-size:11px;outline:none;width:100px;flex-shrink:0" />`}
        <input type="text" value=${texto}
          onChange=${ev=>setTexto(ev.target.value)}
          onKeyDown=${ev=>{ if(ev.key==="Enter") enviar(); }}
          placeholder="Comentar... (Enter para enviar)"
          style="flex:1;padding:6px 8px;background:#fff;border:1px solid #FDE68A;border-radius:8px;color:#1C1C1C;font-size:12px;outline:none" />
        <button onClick=${enviar} disabled=${saving||!texto.trim()||!autor}
          style=${"padding:6px 12px;border-radius:8px;font-size:11px;font-weight:700;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;flex-shrink:0;"+(texto.trim()&&autor?"background:#D97706;color:#fff":"background:#FEF9C3;color:#D97706")}>
          ${saving?"...":"↩"}

    </div>`;
}

  const removeEtapa = async (id) => {
    if (!confirm("Remover esta etapa?")) return;
    await savePlan(etapas.filter(e => e.id!==id));
  };

  const importFromCanvas = async () => {
    const roadmap = detail.analise_canvas?.roadmap || "";
    if (!roadmap) { alert("Gere o Canvas IA primeiro."); return; }
    const linhas = roadmap.split("\n").filter(l => l.match(/^\s*-?\s*\[?\s*\]?\s*.+/));
    const faseAtual = { nome:"Fase 1" };
    const novas = [];
    linhas.forEach(l => {
      const fm = l.match(/FASE\s*(\d+)[:\s]*(.+)?/i);
      if (fm) { faseAtual.nome = "Fase "+fm[1]; return; }
      const titulo = l.replace(/^\s*-?\s*\[?\s*[xX ]?\s*\]?\s*/,"").trim();
      if (titulo.length < 3) return;
      novas.push({ id:Date.now().toString()+Math.random(), titulo, responsavel:"", prazo:"", fase:faseAtual.nome, status:"A fazer", origem:"canvas" });
    });
    if (!novas.length) { alert("Não foi possível extrair etapas do roadmap."); return; }
    await savePlan([...etapas.filter(e=>e.origem!=="canvas"), ...novas]);
  };

  const STA_ETAPA = {
    "A fazer":      { bg:"#F1F5F9", color:"#475569", border:"#CBD5E1" },
    "Em andamento": { bg:"#FFFBEB", color:"#D97706", border:"#FDE68A" },
    "Concluído":    { bg:"#EDFCF5", color:"#065F46", border:"#A7F3D0" },
  };
  const FASES        = ["Fase 1","Fase 2","Fase 3","Outro"];
  const STATUS_ETAPA = ["A fazer","Em andamento","Concluído"];
  const fases   = [...new Set(etapas.map(e=>e.fase||"Fase 1"))].sort();
  const porFase = fases.map(f=>({ fase:f, itens:etapas.filter(e=>(e.fase||"Fase 1")===f) }));
  const concluidos = etapas.filter(e=>e.status==="Concluído").length;

  const FieldIn = ({label,val,onChange,type="text",placeholder=""}) => html`
    <div>
      <p style="color:#9193A0;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px">${label}</p>
      <input type=${type} value=${val} onChange=${onChange} placeholder=${placeholder}
        style="width:100%;padding:7px 10px;background:#F7F9FC;border:1px solid #E8ECF1;border-radius:8px;color:#1C1C1C;font-size:12px;outline:none;box-sizing:border-box" />
    </div>`;

  const EtapaForm = ({vals,setVals,onSave,onCancel,saveLabel="Adicionar"}) => html`
    <div style="background:#F7F9FC;border:1px solid #E8ECF1;border-radius:10px;padding:12px;display:flex;flex-direction:column;gap:8px">
      ${FieldIn({label:"Título *",val:vals.titulo,onChange:e=>setVals(p=>({...p,titulo:e.target.value})),placeholder:"Ex: Configurar ambiente"})}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div>
          <p style="color:#9193A0;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px">Responsável</p>
          ${membros.length>0 ? html`
            <select value=${vals.responsavel} onChange=${e=>setVals(p=>({...p,responsavel:e.target.value}))}
              style="width:100%;padding:7px 26px 7px 10px;background:#F7F9FC;border:1px solid #E8ECF1;border-radius:8px;color:#1C1C1C;font-size:12px;outline:none;cursor:pointer;box-sizing:border-box">
              <option value="">Selecionar membro...</option>
              ${membros.map(m=>html`<option key=${m.id} value=${m.nome}>${m.nome}${m.area?" · "+m.area:""}</option>`)}
            </select>` : html`
            <input type="text" value=${vals.responsavel} onChange=${e=>setVals(p=>({...p,responsavel:e.target.value}))}
              placeholder="Ex: Natalia"
              style="width:100%;padding:7px 10px;background:#F7F9FC;border:1px solid #E8ECF1;border-radius:8px;color:#1C1C1C;font-size:12px;outline:none;box-sizing:border-box" />`}
        </div>
        ${FieldIn({label:"Prazo",val:vals.prazo,onChange:e=>setVals(p=>({...p,prazo:e.target.value})),type:"date"})}
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div>
          <p style="color:#9193A0;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px">Fase</p>
          <select value=${vals.fase} onChange=${e=>setVals(p=>({...p,fase:e.target.value}))}
            style="width:100%;padding:7px 26px 7px 10px;background:#F7F9FC;border:1px solid #E8ECF1;border-radius:8px;color:#1C1C1C;font-size:12px;outline:none;cursor:pointer;box-sizing:border-box">
            ${FASES.map(f=>html`<option key=${f} value=${f}>${f}</option>`)}
          </select>
        </div>
        <div>
          <p style="color:#9193A0;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px">Status</p>
          <select value=${vals.status} onChange=${e=>setVals(p=>({...p,status:e.target.value}))}
            style="width:100%;padding:7px 26px 7px 10px;background:#F7F9FC;border:1px solid #E8ECF1;border-radius:8px;color:#1C1C1C;font-size:12px;outline:none;cursor:pointer;box-sizing:border-box">
            ${STATUS_ETAPA.map(s=>html`<option key=${s} value=${s}>${s}</option>`)}
          </select>
        </div>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:4px">
        <button onClick=${onCancel}
          style="padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;background:#fff;color:#9193A0;border:1px solid #E8ECF1;font-family:'Plus Jakarta Sans',sans-serif">
          Cancelar
        </button>
        <button onClick=${onSave} disabled=${!vals.titulo.trim()||saving}
          style=${"padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:'Plus Jakarta Sans',sans-serif;"+(vals.titulo.trim()?"background:#009FCF;color:#fff":"background:#F1F5F9;color:#C0C4CC;cursor:not-allowed")}>
          ${saving?"Salvando…":saveLabel}
        </button>
      </div>
    </div>`;

  return html`
    <div style="display:flex;flex-direction:column;gap:20px">

      <!-- BOTÃO GERAR IA -->
      ${!smartDraft ? html`
        <div style="display:flex;flex-direction:column;gap:8px">
          <div style=${"display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;padding:14px 16px;background:"+(smart?"#F7F9FC":"#E5F6FB")+";border:1px solid "+(smart?"#E8ECF1":"#B3E4F5")+";border-radius:12px"}>
            <div>
              <p style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:13px;color:#1C1C1C;margin:0 0 2px">
                ${smart ? "Análise SMART + Plano gerado pela IA" : "Gerar Análise SMART + Plano de Desenvolvimento"}
              </p>
              <p style="font-size:11px;color:#9193A0;margin:0">
                ${smart ? "Gerado em "+new Date(smart.gerado_em).toLocaleDateString("pt-BR")+" — clique para regenerar" : "A IA estrutura os critérios SMART e monta um plano com fases e tarefas editáveis"}
              </p>
            </div>
            <button onClick=${gerarSmartEPlano} disabled=${generating}
              style=${"display:flex;align-items:center;gap:6px;padding:9px 18px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:'Plus Jakarta Sans',sans-serif;transition:all .15s;"+(generating?"background:#F1F5F9;color:#C0C4CC;cursor:not-allowed":"background:#009FCF;color:#fff;box-shadow:0 4px 12px rgba(0,159,207,0.25)")}>
              ${generating ? html`
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" class="spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
                Gerando… (30–60s)` : html`
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                ${smart ? "Regenerar SMART + Plano" : "Gerar SMART + Plano"}`}
            </button>
          </div>
          ${(()=>{
            const dv = detail.declaracao_visao || {};
            const campos = [
              dv.objetivo   && "Objetivo",
              dv.kpis       && "KPIs",
              dv.deadline   && "Deadline ("+dv.deadline+")",
              dv.viabilidade && "Viabilidade",
              dv.okr_rel    && "OKR relacionada",
            ].filter(Boolean);
            if (!campos.length) return null;
            return html`
              <div style="display:flex;align-items:flex-start;gap:8px;padding:10px 12px;background:#EDFCF5;border:1px solid #A7F3D0;border-radius:10px">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#065F46" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:1px"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 10.99"/></svg>
                <div>
                  <p style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:11px;color:#065F46;margin:0 0 2px">
                    Usando contexto da Declaração de Visão
                  </p>
                  <p style="font-size:11px;color:#065F46;margin:0;line-height:1.5">
                    A IA vai usar os campos já preenchidos pelo time: <strong>${campos.join(", ")}</strong>. O SMART gerado vai respeitar essas definições em vez de inventar do zero.
                  </p>
                </div>
              </div>`;
          })()}
        </div>` : null}

      <!-- RASCUNHO IA -->
      ${smartDraft ? html`
        <div style="display:flex;flex-direction:column;gap:12px;padding:16px;background:#F7F9FC;border:2px solid #009FCF;border-radius:14px">
          <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
            <p style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:13px;color:#009FCF;margin:0">✨ Sugestão da IA — revise e confirme</p>
            <div style="display:flex;gap:8px">
              <button onClick=${()=>{ setSmartDraft(null); setPlanDraft(null); }}
                style="padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;background:#fff;color:#9193A0;border:1px solid #E8ECF1;font-family:'Plus Jakarta Sans',sans-serif">
                Descartar
              </button>
              <button onClick=${confirmarRascunho} disabled=${saving}
                style="padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;background:#00BE8C;color:#fff;border:none;font-family:'Plus Jakarta Sans',sans-serif">
                ${saving?"Salvando…":"✓ Confirmar e salvar"}
              </button>
            </div>
          </div>

          <div style="display:flex;flex-direction:column;gap:8px">
            ${SMART_KEYS.map(({key,label,hint})=>html`
              <div key=${key} style="background:#fff;border:1px solid #E8ECF1;border-radius:10px;padding:10px 12px">
                <p style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:11px;color:#009FCF;margin:0 0 2px">${label}</p>
                <p style="color:#9193A0;font-size:10px;margin:0 0 6px;font-style:italic">${hint}</p>
                <textarea value=${smartDraft[key]}
                  onChange=${e=>setSmartDraft(p=>({...p,[key]:e.target.value}))}
                  rows="2"
                  style="width:100%;padding:7px 10px;background:#F7F9FC;border:1px solid #E8ECF1;border-radius:8px;color:#1C1C1C;font-size:12px;outline:none;resize:vertical;box-sizing:border-box;font-family:'Inter',sans-serif;line-height:1.5">
                </textarea>
              </div>`)}
          </div>

          ${planDraft && planDraft.length ? html`
            <div>
              <p style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:12px;color:#1C1C1C;margin:0 0 8px">Plano sugerido — ${planDraft.length} etapas</p>
              <div style="display:flex;flex-direction:column;gap:4px">
                ${planDraft.map((e,idx)=>html`
                  <div key=${e.id} style="display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #E8ECF1;border-radius:8px;padding:8px 10px">
                    <span style="font-family:'Plus Jakarta Sans',sans-serif;font-size:10px;font-weight:700;color:#009FCF;background:#E5F6FB;padding:2px 6px;border-radius:6px;flex-shrink:0">${e.fase}</span>
                    <span style="flex:1;font-size:12px;color:#1C1C1C">${e.titulo}</span>
                    ${e.responsavel ? html`<span style="font-size:11px;color:#9193A0">👤 ${e.responsavel}</span>` : null}
                    ${e.prazo ? html`<span style="font-size:11px;color:#9193A0">📅 ${new Date(e.prazo+"T00:00:00").toLocaleDateString("pt-BR")}</span>` : null}
                    <button onClick=${()=>setPlanDraft(p=>p.filter((_,i)=>i!==idx))}
                      style="background:none;border:none;cursor:pointer;color:#C0C4CC;padding:2px;flex-shrink:0"
                      onMouseEnter=${ev=>ev.currentTarget.style.color="#F73A60"}
                      onMouseLeave=${ev=>ev.currentTarget.style.color="#C0C4CC"}>
                      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18"/><path d="M6 6l12 12"/></svg>
                    </button>
                  </div>`)}
              </div>
            </div>` : null}
        </div>` : null}

      <!-- SMART SALVO -->
      ${smart && !smartDraft ? html`
        <div style="background:#F7F9FC;border:1px solid #E8ECF1;border-radius:12px;padding:14px 16px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
            <p style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:12px;color:#1C1C1C;margin:0">Análise SMART</p>
            <button onClick=${()=>setEditSmart(!editSmart)}
              style=${"display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;background:"+(editSmart?"#E5F6FB":"#fff")+";color:"+(editSmart?"#009FCF":"#9193A0")+";border:1px solid "+(editSmart?"#009FCF":"#E8ECF1")}>
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              ${editSmart?"Concluir":"Editar"}
            </button>
          </div>
          <div style="display:flex;flex-direction:column;gap:6px">
            ${SMART_KEYS.map(({key,label})=>html`
              <div key=${key} style=${"display:grid;grid-template-columns:140px 1fr;gap:8px;align-items:"+(editSmart?"start":"center")}>
                <span style="font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:700;color:#009FCF">${label}</span>
                ${editSmart ? html`
                  <textarea value=${smart[key]}
                    onChange=${async e=>{ const u={...smart,[key]:e.target.value}; await saveSmart(u); }}
                    rows="2"
                    style="padding:6px 8px;background:#fff;border:1px solid #E8ECF1;border-radius:8px;color:#1C1C1C;font-size:12px;outline:none;resize:vertical;box-sizing:border-box;font-family:'Inter',sans-serif;line-height:1.5;width:100%">
                  </textarea>` : html`
                  <p style="font-size:12px;color:#4A4A4A;margin:0;line-height:1.55">${smart[key]}</p>`}
              </div>`)}
          </div>
        </div>` : null}

      <!-- PROGRESSO + AÇÕES -->
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">
        <div style="flex:1;min-width:160px">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
            <span style="font-size:12px;color:#9193A0">${concluidos} de ${etapas.length} etapas concluídas</span>
            ${etapas.length ? html`<span style="font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:700;color:#009FCF">${Math.round(concluidos/etapas.length*100)}%</span>` : null}
          </div>
          ${etapas.length ? html`
            <div style="height:6px;background:#F1F5F9;border-radius:999px;overflow:hidden">
              <div style=${"height:100%;background:#009FCF;border-radius:999px;width:"+Math.round(concluidos/etapas.length*100)+"%"}></div>
            </div>` : null}
        </div>
        <div style="display:flex;gap:8px">
          ${detail.analise_canvas && !smartDraft ? html`
            <button onClick=${importFromCanvas}
              style="display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;background:#E5F6FB;color:#009FCF;border:1px solid #B3E4F5;font-family:'Plus Jakarta Sans',sans-serif">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
              Importar Canvas
            </button>` : null}
          <button onClick=${()=>{ setForm(EMPTY_ETAPA); setAdding(true); setEditingId(null); }}
            style="display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;background:#009FCF;color:#fff;border:none;font-family:'Plus Jakarta Sans',sans-serif">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
            Nova etapa
          </button>
        </div>
      </div>

      ${adding ? html`${EtapaForm({vals:form,setVals:setForm,onSave:addEtapa,onCancel:()=>setAdding(false),saveLabel:"Adicionar"})}` : null}

      ${etapas.length===0 && !adding ? html`
        <div style="text-align:center;padding:32px 0;color:#9193A0">
          <p style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;font-size:14px;color:#4A4A4A;margin-bottom:6px">Nenhuma etapa ainda</p>
          <p style="font-size:12px">Use "Gerar SMART + Plano" para a IA estruturar o projeto, ou adicione manualmente.</p>
        </div>` : null}

      ${porFase.map(({fase,itens})=>html`
        <div key=${fase}>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            <span style="width:3px;height:14px;background:#009FCF;border-radius:2px;display:inline-block;flex-shrink:0"></span>
            <h3 style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:12px;color:#1C1C1C;margin:0">${fase}</h3>
            <span style="color:#C0C4CC;font-size:11px">${itens.filter(e=>e.status==="Concluído").length}/${itens.length}</span>
          </div>
          <div style="display:flex;flex-direction:column;gap:6px">
            ${itens.map(e=>{
              const st = STA_ETAPA[e.status]||STA_ETAPA["A fazer"];
              const isEditing = editingId===e.id;
              const [ef,setEf] = useState({...e});
              return html`
                <div key=${e.id} style=${"background:#fff;border:1px solid "+(e.status==="Concluído"?"#A7F3D0":"#E8ECF1")+";border-radius:10px;padding:10px 12px;display:flex;flex-direction:column;gap:8px"}>
                  ${isEditing ? html`
                    ${EtapaForm({vals:ef,setVals:setEf,onSave:()=>updateEtapa(e.id,ef),onCancel:()=>setEditingId(null),saveLabel:"Salvar"})}
                  ` : html`
                    <div style="display:flex;align-items:flex-start;gap:8px">
                      <button onClick=${()=>updateEtapa(e.id,{
                          status: e.status==="Concluído" ? "A fazer" : "Concluído",
                          data_conclusao: e.status==="Concluído" ? null : new Date().toISOString().split("T")[0],
                        })}
                        style=${"width:16px;height:16px;border-radius:4px;border:2px solid;cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;background:"+(e.status==="Concluído"?"#00BE8C":"#fff")+";border-color:"+(e.status==="Concluído"?"#00BE8C":"#CBD5E1")}>
                        ${e.status==="Concluído" ? html`<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>` : null}
                      </button>
                      <div style="flex:1;min-width:0">
                        <p style=${"font-size:12px;font-weight:600;color:"+(e.status==="Concluído"?"#9193A0":"#1C1C1C")+";text-decoration:"+(e.status==="Concluído"?"line-through":"none")+";margin-bottom:3px"}>${e.titulo}</p>
                        <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center">
                          ${e.responsavel ? html`<span style="font-size:11px;color:#9193A0">👤 ${e.responsavel}</span>` : null}
                          ${e.prazo ? html`<span style="font-size:11px;color:#9193A0">📅 ${new Date(e.prazo+"T00:00:00").toLocaleDateString("pt-BR")}</span>` : null}
                          ${e.origem==="canvas" ? html`<span style="background:#E5F6FB;color:#009FCF;border:1px solid #B3E4F5;font-size:9px;font-weight:700;padding:1px 6px;border-radius:999px;font-family:'Plus Jakarta Sans',sans-serif">Canvas</span>` : null}
                          ${e.origem==="smart-ia" ? html`<span style="background:#F5F0FF;color:#6D28D9;border:1px solid #DDD6FE;font-size:9px;font-weight:700;padding:1px 6px;border-radius:999px;font-family:'Plus Jakarta Sans',sans-serif">✨ IA</span>` : null}
                        </div>
                      </div>
                      <select value=${e.status} onChange=${ev=>updateEtapa(e.id,{
                          status: ev.target.value,
                          data_conclusao: ev.target.value==="Concluído" ? new Date().toISOString().split("T")[0] : ev.target.value==="A fazer" ? null : e.data_conclusao||null,
                        })}
                        style=${"font-family:'Plus Jakarta Sans',sans-serif;font-size:10px;font-weight:700;padding:2px 20px 2px 8px;border-radius:999px;border:1px solid;cursor:pointer;outline:none;background:"+st.bg+";color:"+st.color+";border-color:"+st.border}>
                        ${STATUS_ETAPA.map(s=>html`<option key=${s} value=${s}>${s}</option>`)}
                      </select>
                      <div style="display:flex;gap:2px;flex-shrink:0">
                        <!-- botão comentário -->
                        <button onClick=${()=>setEditingId(editingId==="cmt_"+e.id?null:"cmt_"+e.id)}
                          title="Comentários"
                          style=${"background:none;border:none;cursor:pointer;padding:2px;position:relative;color:"+(e.comentarios?.length?"#F5BC50":"#C0C4CC")}
                          onMouseEnter=${ev=>ev.currentTarget.style.color="#F5BC50"}
                          onMouseLeave=${ev=>ev.currentTarget.style.color=(e.comentarios?.length?"#F5BC50":"#C0C4CC")}>
                          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                          ${e.comentarios?.length ? html`<span style="position:absolute;top:-2px;right:-2px;width:8px;height:8px;border-radius:50%;background:#F5BC50;border:1px solid #fff"></span>` : null}
                        </button>
                        <button onClick=${()=>{ setEf({...e}); setEditingId(e.id); setAdding(false); }}
                          style="background:none;border:none;cursor:pointer;color:#C0C4CC;padding:2px"
                          onMouseEnter=${ev=>ev.currentTarget.style.color="#009FCF"}
                          onMouseLeave=${ev=>ev.currentTarget.style.color="#C0C4CC"}>
                          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                        </button>
                        <button onClick=${()=>removeEtapa(e.id)}
                          style="background:none;border:none;cursor:pointer;color:#C0C4CC;padding:2px"
                          onMouseEnter=${ev=>ev.currentTarget.style.color="#F73A60"}
                          onMouseLeave=${ev=>ev.currentTarget.style.color="#C0C4CC"}>
                          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18"/><path d="M6 6l12 12"/></svg>
                        </button>
                      </div>
                    </div>
                    <!-- painel de comentários da etapa -->
                    ${editingId==="cmt_"+e.id ? html`
                      <${EtapaComentarios} e=${e} membros=${membros} onSave=${async (novos)=>{
                        await savePlan(etapas.map(et=>et.id===e.id?{...et,comentarios:novos}:et));
                      }} />` : null}
                  `}
                </div>`; })}
          </div>
        </div>`)}
    </div>`;
}

/* ─── DASHBOARD VIEW ─────────────────────────────────────── */
function DashboardView({ iniciativas, clusters, onAbrirProjeto }) {
  const hoje = new Date(); hoje.setHours(0,0,0,0);

  /* ── métricas gerais ── */
  const total      = iniciativas.length;
  const porStatus  = STATUS_OPTS.map(s=>({ label:s, n:iniciativas.filter(i=>i.status===s).length }));
  const porArea    = AREAS.map(a=>({ label:a, n:iniciativas.filter(i=>i.area===a).length })).filter(a=>a.n>0).sort((a,b)=>b.n-a.n);
  const porOKR     = OKRS.map(o=>({ label:o, n:iniciativas.filter(i=>i.okr===o).length }));
  const porTipo    = [...new Set(iniciativas.map(i=>i.classificacao||"Projeto"))];
  const concluidas = iniciativas.filter(i=>i.status==="Concluida").length;
  const emDes      = iniciativas.filter(i=>i.status==="Em Desenvolvimento").length;
  const aprovadas  = iniciativas.filter(i=>i.status==="Aprovada").length;
  const pctConc    = total ? Math.round(concluidas/total*100) : 0;

  /* ── todas as etapas ── */
  const todasEtapas = iniciativas.flatMap(ini => {
    const nomeP = ini.declaracao_visao?.titulo?.trim() || ini.problema?.substring(0,45) || "#"+String(ini.num).padStart(2,"0");
    return (ini.planejamento||[]).map(e=>({...e, nome_projeto:nomeP, iniciativa_id:ini.id, area:ini.area,
      prazoDate: e.prazo ? new Date(e.prazo+"T00:00:00") : null }));
  });
  const etapasAtrasadas = todasEtapas.filter(e=>e.prazoDate&&e.prazoDate<hoje&&e.status!=="Concluído");
  const etapasHoje      = todasEtapas.filter(e=>e.prazoDate&&e.prazoDate.getTime()===hoje.getTime()&&e.status!=="Concluído");

  /* ── projetos mais atrasados ── */
  const projAtrasados = useMemo(()=>{
    const map = {};
    etapasAtrasadas.forEach(e=>{
      if (!map[e.iniciativa_id]) map[e.iniciativa_id] = { nome:e.nome_projeto, id:e.iniciativa_id, atrasadas:0, maxDias:0 };
      const dias = Math.ceil((hoje-e.prazoDate)/86400000);
      map[e.iniciativa_id].atrasadas++;
      map[e.iniciativa_id].maxDias = Math.max(map[e.iniciativa_id].maxDias, dias);
    });
    return Object.values(map).sort((a,b)=>b.maxDias-a.maxDias).slice(0,6);
  },[etapasAtrasadas]);

  /* ── avanço por OKR ── */
  const okrStats = OKRS.map(okr=>{
    const ini = iniciativas.filter(i=>i.okr===okr);
    const conc = ini.filter(i=>i.status==="Concluida").length;
    const emD  = ini.filter(i=>i.status==="Em Desenvolvimento").length;
    return { okr, total:ini.length, conc, emD, pct: ini.length ? Math.round((conc+emD*0.5)/ini.length*100) : 0 };
  });

  /* ── status das atividades ── */
  const ativStats = {
    total:      todasEtapas.length,
    concluidas: todasEtapas.filter(e=>e.status==="Concluído").length,
    andamento:  todasEtapas.filter(e=>e.status==="Em andamento").length,
    atrasadas:  etapasAtrasadas.length,
    hoje:       etapasHoje.length,
  };

  /* ── helpers visuais ── */
  const STA_CLR = { "Backlog":"#94A3B8","Em Analise":"#D97706","Aprovada":"#0369A1","Em Desenvolvimento":"#6D28D9","Concluida":"#00BE8C" };
  const OKR_CLR = { "OKR 1 Receita":"#00BE8C","OKR 2 Margem":"#6D28D9","Transversal":"#009FCF" };
  const AREA_CLR = ["#009FCF","#00BE8C","#F73A60","#F5BC50","#8B5CF6","#EC4899","#F97316","#14B8A6"];
  const aClr = (a) => AREA_CLR[AREAS.indexOf(a)%AREA_CLR.length]||"#009FCF";

  /* ── barra horizontal de gráfico ── */
  const HBar = ({label, val, total, color, onClick}) => {
    const pct = total ? Math.round(val/total*100) : 0;
    return html`
      <div style="display:flex;align-items:center;gap:8px;cursor:${onClick?"pointer":"default"}"
        onClick=${onClick||null}
        onMouseEnter=${e=>{ if(onClick) e.currentTarget.style.opacity=".8"; }}
        onMouseLeave=${e=>{ if(onClick) e.currentTarget.style.opacity="1"; }}>
        <span style="font-size:11px;color:#4A4A4A;width:120px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${label}</span>
        <div style="flex:1;height:20px;background:#F1F5F9;border-radius:6px;overflow:hidden">
          <div style=${"height:100%;background:"+color+";border-radius:6px;width:"+pct+"%25;transition:width .4s ease;display:flex;align-items:center;padding-left:6px;min-width:"+(val>0?"20px":"0")}>
            ${val>0?html`<span style="font-size:10px;font-weight:700;color:#fff;white-space:nowrap">${val}</span>`:null}
          </div>
        </div>
        <span style="font-size:10px;color:#9193A0;width:30px;text-align:right;flex-shrink:0">${pct}%</span>
      </div>`;
  };

  /* ── donut simples SVG ── */
  const Donut = ({pct, color, size=80}) => {
    const r = 28; const circ = 2*Math.PI*r;
    const dash = circ * pct/100;
    return html`
      <svg width=${size} height=${size} viewBox="0 0 64 64">
        <circle cx="32" cy="32" r=${r} fill="none" stroke="#F1F5F9" stroke-width="8"/>
        <circle cx="32" cy="32" r=${r} fill="none" stroke=${color} stroke-width="8"
          stroke-dasharray="${dash} ${circ}" stroke-dashoffset=${circ/4}
          stroke-linecap="round" style="transition:stroke-dasharray .6s ease"/>
        <text x="32" y="36" text-anchor="middle" font-size="13" font-weight="800" fill=${color} font-family="Plus Jakarta Sans,sans-serif">${pct}%</text>
      </svg>`;
  };

  /* ── card de stat ── */
  const StatCard = ({n, label, color, bg, sub}) => html`
    <div style=${"background:"+bg+";border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:4px"}>
      <span style=${"font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:28px;color:"+color+";line-height:1"}>${n}</span>
      <span style="font-size:12px;color:#4A4A4A;font-weight:600">${label}</span>
      ${sub?html`<span style="font-size:10px;color:#9193A0">${sub}</span>`:null}
    </div>`;

  return html`
    <div style="display:flex;flex-direction:column;flex:1;background:#F7F9FC;overflow-y:auto;min-height:0">

      <!-- título executivo -->
      <div style="background:#fff;border-bottom:1px solid #E8ECF1;padding:16px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <div>
          <h2 style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:18px;color:#1C1C1C;margin:0 0 2px">Dashboard Executivo</h2>
          <p style="font-size:12px;color:#9193A0;margin:0">Visão geral · ${new Date().toLocaleDateString("pt-BR",{weekday:"long",day:"2-digit",month:"long",year:"numeric"})}</p>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          ${Dots()}
          <span style="font-size:11px;font-weight:700;color:#009FCF;font-family:'Plus Jakarta Sans',sans-serif;letter-spacing:.06em;text-transform:uppercase">ETC Filmes</span>
        </div>
      </div>

      <div style="padding:24px;display:flex;flex-direction:column;gap:24px">

        <!-- ROW 1: stats principais -->
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px">
          ${StatCard({n:total,        label:"Total de iniciativas",      color:"#1C1C1C",  bg:"#fff",     sub:total+" cadastradas"})}
          ${StatCard({n:concluidas,   label:"Concluídas",                color:"#065F46",  bg:"#EDFCF5",  sub:pctConc+"% do total"})}
          ${StatCard({n:emDes,        label:"Em desenvolvimento",        color:"#5B21B6",  bg:"#F5F0FF",  sub:"em execução agora"})}
          ${StatCard({n:aprovadas,    label:"Aprovadas",                 color:"#0369A1",  bg:"#EFF8FF",  sub:"aguardando início"})}
          ${StatCard({n:ativStats.atrasadas, label:"Atividades atrasadas", color:"#F73A60", bg:"#FEE8ED", sub:ativStats.hoje+" vencem hoje"})}
          ${StatCard({n:ativStats.total, label:"Total de atividades",    color:"#D97706",  bg:"#FFFBEB",  sub:ativStats.concluidas+" concluídas"})}
        </div>

        <!-- ROW 2: gráficos em duas colunas -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">

          <!-- STATUS das iniciativas -->
          <div style="background:#fff;border:1px solid #E8ECF1;border-radius:14px;padding:20px">
            <p style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:13px;color:#1C1C1C;margin:0 0 16px">Iniciativas por Status</p>
            <div style="display:flex;flex-direction:column;gap:8px">
              ${porStatus.map(s=>HBar({label:s.label, val:s.n, total, color:STA_CLR[s.label]||"#94A3B8"}))}
            </div>
          </div>

          <!-- OKR progress -->
          <div style="background:#fff;border:1px solid #E8ECF1;border-radius:14px;padding:20px">
            <p style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:13px;color:#1C1C1C;margin:0 0 16px">Avanço por OKR</p>
            <div style="display:flex;flex-direction:column;gap:16px">
              ${okrStats.map(o=>html`
                <div key=${o.okr} style="display:flex;align-items:center;gap:16px">
                  ${Donut({pct:o.pct, color:OKR_CLR[o.okr]||"#009FCF"})}
                  <div style="flex:1">
                    <p style=${"font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:12px;color:"+(OKR_CLR[o.okr]||"#009FCF")+";margin:0 0 4px"}>${o.okr}</p>
                    <p style="font-size:11px;color:#9193A0;margin:0 0 6px">${o.total} iniciativa${o.total!==1?"s":""} · ${o.conc} concluída${o.conc!==1?"s":""} · ${o.emD} em andamento</p>
                    <div style="height:6px;background:#F1F5F9;border-radius:999px;overflow:hidden">
                      <div style=${"height:100%;background:"+(OKR_CLR[o.okr]||"#009FCF")+";border-radius:999px;width:"+o.pct+"%25"}></div>
                    </div>
                  </div>
                </div>`)}
            </div>
          </div>
        </div>

        <!-- ROW 3: Área + Atividades -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">

          <!-- ÁREA -->
          <div style="background:#fff;border:1px solid #E8ECF1;border-radius:14px;padding:20px">
            <p style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:13px;color:#1C1C1C;margin:0 0 16px">Iniciativas por Área</p>
            <div style="display:flex;flex-direction:column;gap:8px">
              ${porArea.map(a=>HBar({label:a.label, val:a.n, total, color:aClr(a.label)}))}
            </div>
          </div>

          <!-- STATUS ATIVIDADES -->
          <div style="background:#fff;border:1px solid #E8ECF1;border-radius:14px;padding:20px">
            <p style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:13px;color:#1C1C1C;margin:0 0 16px">Status das Atividades</p>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
              ${[
                ["Concluídas",    ativStats.concluidas, "#00BE8C","#EDFCF5"],
                ["Em andamento",  ativStats.andamento,  "#D97706","#FFFBEB"],
                ["Atrasadas",     ativStats.atrasadas,  "#F73A60","#FEE8ED"],
                ["Vencem hoje",   ativStats.hoje,       "#C2410C","#FFF4ED"],
              ].map(([l,n,c,b])=>html`
                <div style=${"background:"+b+";border-radius:10px;padding:12px;text-align:center"}>
                  <p style=${"font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:22px;color:"+c+";margin:0;line-height:1"}>${n}</p>
                  <p style="font-size:10px;color:#9193A0;margin:4px 0 0">${l}</p>
                </div>`)}
            </div>
            <!-- barra de progresso geral das atividades -->
            <div>
              <div style="display:flex;justify-content:space-between;margin-bottom:4px">
                <span style="font-size:11px;color:#9193A0">Progresso geral das atividades</span>
                <span style="font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:700;color:#009FCF">
                  ${ativStats.total ? Math.round(ativStats.concluidas/ativStats.total*100) : 0}%
                </span>
              </div>
              <div style="height:8px;background:#F1F5F9;border-radius:999px;overflow:hidden">
                <div style=${"height:100%;background:#009FCF;border-radius:999px;width:"+(ativStats.total?Math.round(ativStats.concluidas/ativStats.total*100):0)+"%25"}></div>
              </div>
            </div>
          </div>
        </div>

        <!-- ROW 4: Projetos com mais atrasos -->
        ${projAtrasados.length ? html`
          <div style="background:#fff;border:1px solid #E8ECF1;border-radius:14px;padding:20px">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
              <p style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:13px;color:#1C1C1C;margin:0">⚠ Projetos com Atividades Atrasadas</p>
              <span style="font-size:11px;color:#9193A0">${projAtrasados.length} projeto${projAtrasados.length!==1?"s":""} com atraso</span>
            </div>
            <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px">
              ${projAtrasados.map(p=>html`
                <div key=${p.id}
                  onClick=${()=>onAbrirProjeto(p.id)}
                  style="display:flex;align-items:center;gap:10px;padding:12px;background:#FFF5F5;border:1px solid #FECDD3;border-radius:10px;cursor:pointer;transition:all .15s"
                  onMouseEnter=${e=>{ e.currentTarget.style.background="#FEE8ED"; e.currentTarget.style.borderColor="#F73A60"; }}
                  onMouseLeave=${e=>{ e.currentTarget.style.background="#FFF5F5"; e.currentTarget.style.borderColor="#FECDD3"; }}>
                  <div style="flex:1;min-width:0">
                    <p style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:12px;color:#1C1C1C;margin:0 0 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.nome}</p>
                    <p style="font-size:10px;color:#9193A0;margin:0">${p.atrasadas} atividade${p.atrasadas!==1?"s":""} atrasada${p.atrasadas!==1?"s":""}</p>
                  </div>
                  <span style="background:#F73A60;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:800;padding:3px 10px;border-radius:999px;white-space:nowrap;flex-shrink:0">
                    +${p.maxDias}d
                  </span>
                </div>`)}
            </div>
          </div>` : null}

        <!-- ROW 5: Iniciativas recentes por status (top 5 Em Desenvolvimento) -->
        <div style="background:#fff;border:1px solid #E8ECF1;border-radius:14px;padding:20px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
            <p style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:13px;color:#1C1C1C;margin:0">🚀 Em Desenvolvimento agora</p>
            <span style="font-size:11px;color:#9193A0">${emDes} projeto${emDes!==1?"s":""}</span>
          </div>
          ${emDes===0 ? html`
            <p style="font-size:13px;color:#9193A0;text-align:center;padding:16px 0">Nenhuma iniciativa em desenvolvimento no momento.</p>` : html`
            <div style="display:flex;flex-direction:column;gap:8px">
              ${iniciativas.filter(i=>i.status==="Em Desenvolvimento").map(i=>{
                const etapas  = i.planejamento||[];
                const conc    = etapas.filter(e=>e.status==="Concluído").length;
                const pctP    = etapas.length ? Math.round(conc/etapas.length*100) : 0;
                const atrasos = etapas.filter(e=>e.prazoDate&&new Date(e.prazo+"T00:00:00")<hoje&&e.status!=="Concluído").length;
                const cl      = clusters.find(c=>c.id===i.cluster_id);
                return html`
                  <div key=${i.id}
                    onClick=${()=>onAbrirProjeto(i.id)}
                    style="display:flex;align-items:center;gap:12px;padding:12px;border:1px solid #E8ECF1;border-radius:10px;cursor:pointer;transition:all .15s"
                    onMouseEnter=${e=>{ e.currentTarget.style.background="#F7F9FC"; e.currentTarget.style.borderColor="#009FCF"; }}
                    onMouseLeave=${e=>{ e.currentTarget.style.background="#fff"; e.currentTarget.style.borderColor="#E8ECF1"; }}>
                    <!-- info -->
                    <div style="flex:1;min-width:0">
                      <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;flex-wrap:wrap">
                        <span style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:12px;color:#1C1C1C;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:300px">
                          ${i.declaracao_visao?.titulo?.trim()||i.problema?.substring(0,50)||"#"+String(i.num).padStart(2,"0")}
                        </span>
                        <span style="font-size:10px;color:#9193A0;background:#F1F5F9;padding:1px 6px;border-radius:6px;flex-shrink:0">${i.area}</span>
                        ${cl?html`<span style=${"font-size:10px;color:#fff;background:"+cl.cor+";padding:1px 6px;border-radius:6px;flex-shrink:0"}>${cl.nome}</span>`:null}
                      </div>
                      <!-- barra progresso atividades -->
                      ${etapas.length ? html`
                        <div style="display:flex;align-items:center;gap:6px">
                          <div style="flex:1;height:5px;background:#F1F5F9;border-radius:999px;overflow:hidden">
                            <div style=${"height:100%;background:#009FCF;border-radius:999px;width:"+pctP+"%25"}></div>
                          </div>
                          <span style="font-size:10px;color:#9193A0;white-space:nowrap">${conc}/${etapas.length} atividades · ${pctP}%</span>
                        </div>` : html`<span style="font-size:10px;color:#C0C4CC">Sem atividades cadastradas</span>`}
                    </div>
                    <!-- badges direita -->
                    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">
                      ${atrasos>0?html`<span style="background:#FEE8ED;color:#F73A60;font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;font-family:'Plus Jakarta Sans',sans-serif">⚠ ${atrasos} atrasada${atrasos!==1?"s":""}</span>`:null}
                      <span style=${"font-family:'Plus Jakarta Sans',sans-serif;font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;"+(i.prioridade==="Alta"?"background:#FEE8ED;color:#F73A60":i.prioridade==="Media"?"background:#FFFBEB;color:#D97706":"background:#F1F5F9;color:#475569")}>
                        ${i.prioridade}
                      </span>
                    </div>
                  </div>`;
              })}
            </div>`}
        </div>

      </div>
    </div>`;
}

/* ─── DESEMPENHO VIEW ────────────────────────────────────── */
function DesempenhoView({ iniciativas, onAbrirProjeto }) {
  const [ordenar,    setOrdenar]    = useState("atraso"); // "atraso"|"entregues"|"nome"
  const [detalheMembro, setDetalheMembro] = useState(null);
  const hoje = new Date(); hoje.setHours(0,0,0,0);

  /* calcular métricas por membro */
  const membros = useMemo(() => {
    const map = {};
    iniciativas.forEach(ini => {
      const nomeProj = ini.declaracao_visao?.titulo?.trim() || ini.problema?.substring(0,50) || "#"+String(ini.num).padStart(2,"0");
      (ini.planejamento||[]).forEach(e => {
        if (!e.responsavel?.trim()) return;
        const resp = e.responsavel.trim();
        if (!map[resp]) map[resp] = {
          nome: resp,
          total: 0, concluidas: 0, emAndamento: 0, aFazer: 0,
          atrasadas: 0, diasAtraso: 0, maxAtraso: 0,
          entregasNoPrazo: 0, entregasForaPrazo: 0,
          etapas: [],
        };
        const m = map[resp];
        const prazoDate = e.prazo ? new Date(e.prazo+"T00:00:00") : null;
        const atrasada  = prazoDate && e.status!=="Concluído" && prazoDate < hoje;
        const diasAtras = atrasada ? Math.ceil((hoje - prazoDate)/86400000) : 0;

        m.total++;
        if      (e.status==="Concluído")    m.concluidas++;
        else if (e.status==="Em andamento") m.emAndamento++;
        else                                m.aFazer++;

        // atraso em atividades ABERTAS (ainda não concluídas)
        if (atrasada) {
          m.atrasadas++;
          m.diasAtraso += diasAtras;
          m.maxAtraso   = Math.max(m.maxAtraso, diasAtras);
        }

        // atraso em atividades JÁ CONCLUÍDAS (entregue depois do prazo)
        if (e.status==="Concluído" && prazoDate && e.data_conclusao) {
          const dataConclusao = new Date(e.data_conclusao+"T00:00:00");
          if (dataConclusao > prazoDate) {
            const diasAtrasoEntrega = Math.ceil((dataConclusao - prazoDate)/86400000);
            m.entregasForaPrazo++;
            m.diasAtraso += diasAtrasoEntrega;
            m.maxAtraso   = Math.max(m.maxAtraso, diasAtrasoEntrega);
          } else {
            m.entregasNoPrazo++;
          }
        } else if (e.status==="Concluído" && prazoDate && !e.data_conclusao) {
          // concluída antes de termos o registro de data — assume no prazo
          m.entregasNoPrazo++;
        }

        m.etapas.push({
          ...e, prazoDate, atrasada, diasAtras,
          nome_projeto: nomeProj, iniciativa_id: ini.id,
        });
      });
    });
    return Object.values(map);
  }, [iniciativas]);

  const ordenados = useMemo(() => {
    const lista = [...membros];
    if (ordenar==="atraso")     return lista.sort((a,b)=>b.maxAtraso-a.maxAtraso||b.atrasadas-a.atrasadas);
    if (ordenar==="entregues")  return lista.sort((a,b)=>b.concluidas-a.concluidas);
    if (ordenar==="total")      return lista.sort((a,b)=>b.total-a.total);
    return lista.sort((a,b)=>a.nome.localeCompare(b.nome));
  }, [membros, ordenar]);

  /* totais gerais */
  const totais = useMemo(()=>({
    membros:    membros.length,
    total:      membros.reduce((s,m)=>s+m.total,0),
    concluidas: membros.reduce((s,m)=>s+m.concluidas,0),
    atrasadas:  membros.reduce((s,m)=>s+m.atrasadas,0),
    emAndamento:membros.reduce((s,m)=>s+m.emAndamento,0),
  }),[membros]);

  const pct    = (a,b) => b===0 ? 0 : Math.round(a/b*100);
  const clrPct = (p)   => p>=80?"#00BE8C":p>=50?"#F5BC50":"#F73A60";

  /* barra de progresso inline */
  const MiniBar = ({val, max, color="#009FCF"}) => html`
    <div style="width:100%;height:6px;background:#F1F5F9;border-radius:999px;overflow:hidden">
      <div style=${"height:100%;background:"+color+";border-radius:999px;width:"+Math.round(val/Math.max(max,1)*100)+"%"}></div>
    </div>`;

  if (!membros.length) return html`
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:64px;color:#9193A0;flex:1;background:#F7F9FC">
      <p style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:16px;color:#4A4A4A;margin-bottom:6px">Nenhum responsável cadastrado</p>
      <p style="font-size:13px">Adicione responsáveis nas atividades dos projetos para ver o desempenho.</p>
    </div>`;

  return html`
    <div style="display:flex;flex-direction:column;flex:1;background:#F7F9FC;overflow:hidden;min-height:0">

      <!-- sub-header -->
      <div style="background:#fff;border-bottom:1px solid #E8ECF1;padding:10px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;flex-shrink:0">
        <p style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:13px;color:#1C1C1C;margin:0">
          Desempenho da Equipe · ${totais.membros} membro${totais.membros!==1?"s":""}
        </p>
        <!-- stat chips -->
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <span style="background:#EDFCF5;color:#065F46;border:1px solid #A7F3D0;font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;font-family:'Plus Jakarta Sans',sans-serif">
            ✓ ${totais.concluidas} concluídas
          </span>
          <span style="background:#FFFBEB;color:#D97706;border:1px solid #FDE68A;font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;font-family:'Plus Jakarta Sans',sans-serif">
            ⏳ ${totais.emAndamento} em andamento
          </span>
          ${totais.atrasadas ? html`
            <span style="background:#FEE8ED;color:#F73A60;border:1px solid #FECDD3;font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;font-family:'Plus Jakarta Sans',sans-serif">
              ⚠ ${totais.atrasadas} atrasadas
            </span>` : null}
        </div>
        <!-- ordenar -->
        <div style="margin-left:auto;display:flex;align-items:center;gap:6px">
          <span style="font-size:11px;color:#9193A0">Ordenar por</span>
          ${[["atraso","Atraso"],["entregues","Entregues"],["total","Total"],["nome","Nome"]].map(([v,l])=>html`
            <button key=${v} onClick=${()=>setOrdenar(v)}
              style=${"padding:4px 10px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;border:1px solid;transition:all .15s;"+(ordenar===v?"background:#009FCF;color:#fff;border-color:#009FCF":"background:#fff;color:#9193A0;border-color:#E8ECF1")}>
              ${l}
            </button>`)}
        </div>
      </div>

      <!-- cards de membros -->
      <div style="flex:1;overflow-y:auto;padding:24px">
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px">
          ${ordenados.map(m=>{
            const pctConc  = pct(m.concluidas, m.total);
            const clr      = clrPct(pctConc);
            const isOpen   = detalheMembro===m.nome;
            const atrasadasOrdenadas = m.etapas
              .filter(e=>e.atrasada)
              .sort((a,b)=>b.diasAtras-a.diasAtras);
            const emAndamentoList = m.etapas
              .filter(e=>e.status==="Em andamento")
              .sort((a,b)=>(a.prazoDate||new Date(9999,0))-(b.prazoDate||new Date(9999,0)));

            return html`
              <div key=${m.nome} style="background:#fff;border:1px solid #E8ECF1;border-radius:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.04);transition:box-shadow .15s"
                onMouseEnter=${e=>e.currentTarget.style.boxShadow="0 4px 16px rgba(0,159,207,0.08)"}
                onMouseLeave=${e=>e.currentTarget.style.boxShadow="0 1px 4px rgba(0,0,0,0.04)"}>

                <!-- cabeçalho do card -->
                <div style="padding:16px 16px 12px">
                  <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
                    <!-- avatar inicial -->
                    <div style=${"width:36px;height:36px;border-radius:50%;background:"+clr+"22;border:2px solid "+clr+";display:flex;align-items:center;justify-content:center;flex-shrink:0"}>
                      <span style=${"font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:14px;color:"+clr}>
                        ${m.nome.charAt(0).toUpperCase()}
                      </span>
                    </div>
                    <div style="flex:1;min-width:0">
                      <p style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:14px;color:#1C1C1C;margin:0 0 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${m.nome}</p>
                      <p style="font-size:11px;color:#9193A0;margin:0">${m.total} atividade${m.total!==1?"s":""} atribuída${m.total!==1?"s":""}</p>
                    </div>
                    <!-- badge de atraso destacado -->
                    ${m.maxAtraso>0 ? html`
                      <span style="background:#FEE8ED;color:#F73A60;border:1px solid #FECDD3;font-size:10px;font-weight:700;padding:3px 8px;border-radius:999px;font-family:'Plus Jakarta Sans',sans-serif;flex-shrink:0">
                        ⚠ ${m.maxAtraso}d atraso
                      </span>` : html`
                      <span style="background:#EDFCF5;color:#065F46;border:1px solid #A7F3D0;font-size:10px;font-weight:700;padding:3px 8px;border-radius:999px;font-family:'Plus Jakarta Sans',sans-serif;flex-shrink:0">
                        ✓ Em dia
                      </span>`}
                  </div>

                  <!-- métricas em grid -->
                  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px">
                    ${[
                      ["Concluídas", m.concluidas, "#00BE8C", "#EDFCF5"],
                      ["Em andamento", m.emAndamento, "#D97706", "#FFFBEB"],
                      ["Atrasadas", m.atrasadas, "#F73A60", "#FEE8ED"],
                    ].map(([label, val, cor, bg])=>html`
                      <div key=${label} style=${"background:"+bg+";border-radius:8px;padding:8px;text-align:center"}>
                        <p style=${"font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:18px;color:"+cor+";margin:0;line-height:1"}>${val}</p>
                        <p style="font-size:10px;color:#9193A0;margin:3px 0 0">${label}</p>
                      </div>`)}
                  </div>
                  <!-- entregues fora do prazo (concluídas com atraso) -->
                  ${m.entregasForaPrazo>0 ? html`
                    <div style="background:#FFF5F5;border:1px solid #FECDD3;border-radius:8px;padding:8px 10px;display:flex;align-items:center;gap:8px;margin-bottom:4px">
                      <span style="font-size:12px">⚠</span>
                      <p style="font-size:11px;color:#F73A60;font-weight:600;margin:0;flex:1">
                        ${m.entregasForaPrazo} entrega${m.entregasForaPrazo!==1?"s":""} concluída${m.entregasForaPrazo!==1?"s":""} fora do prazo
                      </p>
                      ${m.entregasNoPrazo>0 ? html`<span style="font-size:10px;color:#9193A0">${m.entregasNoPrazo} no prazo</span>` : null}
                    </div>` : m.entregasNoPrazo>0 ? html`
                    <div style="background:#EDFCF5;border:1px solid #A7F3D0;border-radius:8px;padding:8px 10px;display:flex;align-items:center;gap:8px;margin-bottom:4px">
                      <span style="font-size:12px">✓</span>
                      <p style="font-size:11px;color:#065F46;font-weight:600;margin:0">
                        ${m.entregasNoPrazo} entrega${m.entregasNoPrazo!==1?"s":""} concluída${m.entregasNoPrazo!==1?"s":""} no prazo
                      </p>
                    </div>` : null}

                  <!-- barra de conclusão -->
                  <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
                    <div style="flex:1">${MiniBar({val:m.concluidas, max:m.total, color:clr})}</div>
                    <span style=${"font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:700;color:"+clr}>${pctConc}%</span>
                  </div>
                  <p style="font-size:10px;color:#9193A0;margin:0">${pctConc}% das atividades concluídas</p>
                </div>

                <!-- seção de detalhes expandível -->
                ${(m.atrasadas>0||m.emAndamento>0) ? html`
                  <div style="border-top:1px solid #F1F5F9">
                    <button onClick=${()=>setDetalheMembro(isOpen?null:m.nome)}
                      style="width:100%;padding:10px 16px;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:600;color:#9193A0;transition:background .1s"
                      onMouseEnter=${e=>e.currentTarget.style.background="#F7F9FC"}
                      onMouseLeave=${e=>e.currentTarget.style.background="none"}>
                      <span>${isOpen?"Ocultar detalhes":"Ver detalhes"}</span>
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
                        style=${"transition:transform .2s;transform:"+(isOpen?"rotate(180deg)":"rotate(0deg)")}>
                        <polyline points="6 9 12 15 18 9"/>
                      </svg>
                    </button>

                    ${isOpen ? html`
                      <div style="padding:0 16px 14px;display:flex;flex-direction:column;gap:10px">

                        <!-- atrasadas -->
                        ${atrasadasOrdenadas.length ? html`
                          <div>
                            <p style="font-family:'Plus Jakarta Sans',sans-serif;font-size:10px;font-weight:700;color:#F73A60;text-transform:uppercase;letter-spacing:.08em;margin:0 0 6px">
                              ⚠ Atrasadas (${atrasadasOrdenadas.length})
                            </p>
                            <div style="display:flex;flex-direction:column;gap:4px">
                              ${atrasadasOrdenadas.map(e=>html`
                                <div key=${e.id} style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:#FFF5F5;border:1px solid #FECDD3;border-radius:8px;cursor:pointer"
                                  onClick=${()=>onAbrirProjeto(e.iniciativa_id)}
                                  onMouseEnter=${ev=>ev.currentTarget.style.background="#FEE8ED"}
                                  onMouseLeave=${ev=>ev.currentTarget.style.background="#FFF5F5"}>
                                  <div style="flex:1;min-width:0">
                                    <p style="font-size:12px;font-weight:600;color:#1C1C1C;margin:0 0 1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${e.titulo}</p>
                                    <p style="font-size:10px;color:#9193A0;margin:0">📁 ${e.nome_projeto}</p>
                                  </div>
                                  <span style="background:#F73A60;color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px;white-space:nowrap;flex-shrink:0">
                                    +${e.diasAtras}d
                                  </span>
                                </div>`)}
                            </div>
                          </div>` : null}

                        <!-- em andamento -->
                        ${emAndamentoList.length ? html`
                          <div>
                            <p style="font-family:'Plus Jakarta Sans',sans-serif;font-size:10px;font-weight:700;color:#D97706;text-transform:uppercase;letter-spacing:.08em;margin:0 0 6px">
                              Em andamento (${emAndamentoList.length})
                            </p>
                            <div style="display:flex;flex-direction:column;gap:4px">
                              ${emAndamentoList.map(e=>html`
                                <div key=${e.id} style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:#FFFBEB;border:1px solid #FDE68A;border-radius:8px;cursor:pointer"
                                  onClick=${()=>onAbrirProjeto(e.iniciativa_id)}
                                  onMouseEnter=${ev=>ev.currentTarget.style.background="#FEF9C3"}
                                  onMouseLeave=${ev=>ev.currentTarget.style.background="#FFFBEB"}>
                                  <div style="flex:1;min-width:0">
                                    <p style="font-size:12px;font-weight:600;color:#1C1C1C;margin:0 0 1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${e.titulo}</p>
                                    <p style="font-size:10px;color:#9193A0;margin:0">📁 ${e.nome_projeto}</p>
                                  </div>
                                  ${e.prazoDate ? html`
                                    <span style=${"font-size:10px;font-weight:600;padding:2px 7px;border-radius:999px;white-space:nowrap;flex-shrink:0;"+(e.prazoDate<=hoje?"background:#FEE8ED;color:#F73A60":"background:#F1F5F9;color:#475569")}>
                                      📅 ${e.prazoDate.toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"})}
                                    </span>` : null}
                                </div>`)}
                            </div>
                          </div>` : null}
                      </div>` : null}
                  </div>` : null}
              </div>`;
          })}
        </div>
      </div>
    </div>`;
}
