const parseAnalise = (txt) => {
  const s = {};
  const sec = (from, to) => {
    const re = new RegExp("## " + from + "\\.(.*?)(?=\\n## " + to + "\\.|$)", "s");
    const m = txt.match(re);
    if (!m) return "";
    return m[0].replace(new RegExp("^## " + from + "\\..*\\n"), "").trim();
  };
  const r1 = sec("1","2");
  s.ideiaFrase   = (r1.match(/\*\*Ideia em 1 frase:\*\* (.+)/) || [])[1] || "";
  s.viabilidade  = (r1.match(/\*\*Viabilidade:\*\* ([^-\n]+)/) || [])[1]?.trim() || "";
  s.complexidade = (r1.match(/\*\*Complexidade:\*\* (.+)/) || [])[1] || "";
  s.tempo        = (r1.match(/\*\*Tempo estimado:\*\* (.+)/) || [])[1] || "";
  s.custo        = (r1.match(/\*\*Custo estimado:\*\* (.+)/) || [])[1] || "";
  s.roi          = (r1.match(/\*\*ROI esperado:\*\* (.+)/) || [])[1] || "";
  const r2 = sec("2","3");
  s.okrConexao   = (r2.match(/\*\*Conex[aã]o:\*\* (.+)/) || [])[1] || "";
  s.problema = sec("3","4"); s.solucao = sec("4","5"); s.stack = sec("5","6");
  s.roadmap = sec("6","7"); s.estimativas = sec("7","8"); s.riscos = sec("8","9");
  const m9 = txt.match(/## 9\.([\s\S]*?)(?=### RECOMENDA|$)/);
  s.proximosPassos  = m9 ? m9[1].trim() : "";
  s.recomendacao    = (txt.match(/### RECOMENDA[CÇ][AÃ]O FINAL\s*\*\*(.+?)\*\*/) || [])[1] || "";
  s.recomendacaoDesc= (txt.match(/### RECOMENDA[CÇ][AÃ]O FINAL\s*\*\*.+?\*\* - (.+)/) || [])[1] || "";
  const fm = txt.match(/### RESUMO PARA SUBMISS[AÃ]O AO FORMS\n([\s\S]+)$/);
  s.resumoForms = fm ? fm[1].trim() : ((txt.match(/(IDEIA:[\s\S]+RECOMENDA[CÇ][AÃ]O DA SKILL:.+)/) || [])[1] || "");
  return s;
};

/* ─── SUPABASE ───────────────────────────────────────────── */
const supa = async (path, opts={}) => {
  const {method="GET", body, prefer} = opts;
  const headers = {"apikey":SKEY,"Authorization":"Bearer "+SKEY,"Content-Type":"application/json"};
  if (prefer) headers["Prefer"] = prefer;
  const res = await fetch(SURL+"/rest/v1/"+path, {method, headers, body: body ? JSON.stringify(body) : undefined});
  if (!res.ok) { const t = await res.text().catch(()=>res.status.toString()); throw new Error(t.substring(0,200)); }
  const t = await res.text();
  return t ? JSON.parse(t) : null;
};

/* ─── APP ────────────────────────────────────────────────── */

        body: JSON.stringify({model:"claude-sonnet-4-5",max_tokens:4000,messages:[{role:"user",content}]}),
      });
      const data = await r.json().catch(()=>({}));

      document.body.appendChild(el); el.focus(); el.select();
      document.execCommand("copy"); document.body.removeChild(el);
      setCopiado(true); setTimeout(()=>setCopiado(false),2500);

                    <select value=${newNi.okr} onChange=${e=>setNewNi(p=>({...p,okr:e.target.value}))}
                      style="width:100%;padding:9px 26px 9px 12px;background:#F7F9FC;border:1px solid #E8ECF1;border-radius:8px;color:#1C1C1C;font-size:13px;outline:none;cursor:pointer;box-sizing:border-box">
                      ${OKRS.map(o=>html`<option key=${o} value=${o}>${o}</option>`)}
                    </select>
                  </div>
                </div>

                <!-- Classificação -->
                <div>
                  ${SL("Classificação")}
                  <div class="flex gap-2">
                    ${CLASSIFS.map(c=>{ const s=CLF[c]; const act=newNi.classificacao===c; return html`
                      <button key=${c} onClick=${()=>setNewNi(p=>({...p,classificacao:c}))}
                        style=${"padding:6px 14px;border-radius:999px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;border:1px solid;transition:all .15s;"
                          +(act?"background:"+s.bg+";color:"+s.color+";border-color:"+s.border:"background:#fff;color:#9193A0;border-color:#E8ECF1")}>
                        ${c}
                      </button>`; })}
                  </div>
                </div>

                <!-- Prioridade + Complexidade -->
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                  <div>
                    ${SL("Prioridade")}
                    <div class="flex gap-2">
                      ${[["Alta","#F73A60","#FEE8ED","#FECDD3"],["Media","#D97706","#FFFBEB","#FDE68A"],["Baixa","#475569","#F1F5F9","#CBD5E1"]].map(([pr,clr,bg,bd])=>html`
                        <button key=${pr} onClick=${()=>setNewNi(p=>({...p,prioridade:pr}))}
                          style=${"padding:6px 12px;border-radius:999px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;border:1px solid;transition:all .15s;"
                            +(newNi.prioridade===pr?"background:"+bg+";color:"+clr+";border-color:"+bd:"background:#fff;color:#9193A0;border-color:#E8ECF1")}>
                          ${pr}
                        </button>`)})
                    </div>
                  </div>
                  <div>
                    ${SL("Complexidade (1-5)")}
                    <div class="flex gap-1.5 items-center" style="padding-top:4px">
                      ${[1,2,3,4,5].map(n=>html`
                        <button key=${n} onClick=${()=>setNewNi(p=>({...p,complexidade:n}))}
                          style=${"width:28px;height:28px;border-radius:50%;border:none;cursor:pointer;font-size:12px;font-weight:700;font-family:'Plus Jakarta Sans',sans-serif;transition:all .15s;"
                            +(newNi.complexidade===n?"background:#009FCF;color:#fff":"background:#F1F5F9;color:#9193A0")}>
                          ${n}
                        </button>`)}
                    </div>
                  </div>
                </div>

                <!-- Apoio AI Lead -->
                <div>
                  ${SL("Precisa de apoio do AI Lead?")}
                  <div class="flex gap-2">
                    ${["Sim","Nao","Talvez"].map(v=>html`
                      <button key=${v} onClick=${()=>setNewNi(p=>({...p,apoio_ai_lead:v}))}
                        style=${"padding:6px 14px;border-radius:999px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;border:1px solid;transition:all .15s;"
                          +(newNi.apoio_ai_lead===v?"background:#E5F6FB;color:#009FCF;border-color:#009FCF":"background:#fff;color:#9193A0;border-color:#E8ECF1")}>
                        ${v}
                      </button>`)}
                  </div>
                </div>

                <!-- Notas -->
                <div>
                  ${SL("Notas internas (opcional)")}
                  <textarea value=${newNi.notas}
                    onChange=${e=>setNewNi(p=>({...p,notas:e.target.value}))}
                    placeholder="Observações, contexto adicional, contatos..."
                    rows="2"
                    style="width:100%;padding:9px 12px;background:#F7F9FC;border:1px solid #E8ECF1;border-radius:8px;color:#1C1C1C;font-size:13px;outline:none;resize:vertical;box-sizing:border-box;font-family:'Inter',sans-serif"></textarea>
                </div>

              </div>
            </div>

            <div class="px-6 py-4 flex justify-end gap-2" style="border-top:1px solid #F1F5F9">
              <button onClick=${()=>setNiModal(false)}
                style="padding:9px 18px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid #E8ECF1;background:#fff;color:#4A4A4A;font-family:'Plus Jakarta Sans',sans-serif">
                Cancelar
              </button>
              <button onClick=${createIniciativa}
                disabled=${niSaving || !newNi.problema.trim() || !newNi.nome_colaborador.trim()}
                style=${"padding:9px 20px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:'Plus Jakarta Sans',sans-serif;transition:all .15s;"
                  +(niSaving||!newNi.problema.trim()||!newNi.nome_colaborador.trim()?"background:#F1F5F9;color:#C0C4CC;cursor:not-allowed":"background:#009FCF;color:#fff")}>
                ${niSaving ? "Salvando…" : "Salvar Iniciativa"}
              </button>
            </div>
          </div>
        </div>` : null}

      <!-- CLUSTER MODAL -->
      ${cModal ? html`
        <div class="modal-overlay" onClick=${()=>setCModal(false)}>
          <div class="modal-box" style="max-width:420px;padding:24px" onClick=${e=>e.stopPropagation()}>
            <div class="flex items-center justify-between mb-5">
              <h3 style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:16px;color:#1C1C1C;margin:0">Novo Cluster</h3>
              <button onClick=${()=>setCModal(false)} style="background:none;border:none;cursor:pointer;color:#C0C4CC">${IconX(18)}</button>
            </div>
            <div class="flex flex-col gap-4">
              <div>
                <label class="section-label" style="display:block">Nome *</label>
                <input type="text" value=${newC.nome} onChange=${e=>setNewC(p=>({...p,nome:e.target.value}))}
                  placeholder="Ex: Ecossistema de Atendimento"
                  style="width:100%;padding:10px 14px;background:#F7F9FC;border:1px solid #E8ECF1;border-radius:10px;color:#1C1C1C;font-size:13px;outline:none;box-sizing:border-box" />
              </div>
              <div>
                <label class="section-label" style="display:block">Descrição (opcional)</label>
                <input type="text" value=${newC.descricao} onChange=${e=>setNewC(p=>({...p,descricao:e.target.value}))}
                  style="width:100%;padding:10px 14px;background:#F7F9FC;border:1px solid #E8ECF1;border-radius:10px;color:#1C1C1C;font-size:13px;outline:none;box-sizing:border-box" />
              </div>
              <div>
                <label class="section-label" style="display:block">Cor</label>
                <div class="flex flex-wrap gap-2">
                  ${CLR_CLUST.map(c=>html`
                    <button key=${c} onClick=${()=>setNewC(p=>({...p,cor:c}))}
                      style=${"width:28px;height:28px;border-radius:50%;background:"+c+";cursor:pointer;transition:all .15s;border:"+(newC.cor===c?"3px solid #1C1C1C":"3px solid transparent")+";transform:"+(newC.cor===c?"scale(1.15)":"scale(1)")}>
                    </button>`)}
                </div>
              </div>
              ${clusters.length>0 ? html`
                <div>
                  <label class="section-label" style="display:block">Clusters existentes</label>
                  <div style="display:flex;flex-direction:column;gap:6px;max-height:112px;overflow-y:auto">
                    ${clusters.map(c=>html`
                      <div key=${c.id} class="flex items-center gap-2" style="font-size:12px;color:#4A4A4A">
                        <span class="rounded-full" style=${"width:8px;height:8px;background:"+c.cor+";display:inline-block;flex-shrink:0"}></span>
                        <span style="flex:1">${c.nome}</span>
                        <span style="color:#C0C4CC">${iniciativas.filter(i=>i.cluster_id===c.id).length} ini.</span>
                        <button onClick=${()=>deleteCluster(c.id)}
                          style="background:none;border:none;cursor:pointer;color:#E8ECF1;padding:2px"
                          onMouseEnter=${e=>e.currentTarget.style.color="#F73A60"}
                          onMouseLeave=${e=>e.currentTarget.style.color="#E8ECF1"}>
                          ${IconX(12)}
                        </button>
                      </div>`)}
                  </div>
                </div>` : null}
              <button onClick=${createCluster} disabled=${!newC.nome.trim()}
                style=${"width:100%;padding:11px;border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .15s;"
                  +(newC.nome.trim()?"background:#009FCF;color:#fff":"background:#F1F5F9;color:#C0C4CC;cursor:not-allowed")}>
                Criar Cluster
              </button>
            </div>
          </div>
        </div>` : null}
    </div>
  `;
}

render(html`<${App} />`, document.getElementById("root"));
</script>
</body>
</html>
