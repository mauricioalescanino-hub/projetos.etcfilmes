const parseAnalise = (txt) => {
  const s = {};
  const sec = (from, to) => {
    const re = new RegExp("## " + from + "\\.(.*?)(?=\\n## " + to + "\\.|$)", "s");
    const m = txt.match(re);
    if (!m) return "";
    return m[0].replace(new RegExp("^## " + from + "\\..*\\n"), "").trim();
  };
  const r1 = sec("1","2");
  s.ideiaFrase   = (r1.match(/\*\*Ideia em 1 frase:\*\* (.+)/) || [])[1] || "";
  s.viabilidade  = (r1.match(/\*\*Viabilidade:\*\* ([^-\n]+)/) || [])[1]?.trim() || "";
  s.complexidade = (r1.match(/\*\*Complexidade:\*\* (.+)/) || [])[1] || "";
  s.tempo        = (r1.match(/\*\*Tempo estimado:\*\* (.+)/) || [])[1] || "";
  s.custo        = (r1.match(/\*\*Custo estimado:\*\* (.+)/) || [])[1] || "";
  s.roi          = (r1.match(/\*\*ROI esperado:\*\* (.+)/) || [])[1] || "";
  const r2 = sec("2","3");
  s.okrConexao   = (r2.match(/\*\*Conex[aã]o:\*\* (.+)/) || [])[1] || "";
  s.problema = sec("3","4"); s.solucao = sec("4","5"); s.stack = sec("5","6");
  s.roadmap = sec("6","7"); s.estimativas = sec("7","8"); s.riscos = sec("8","9");
  const m9 = txt.match(/## 9\.([\s\S]*?)(?=### RECOMENDA|$)/);
  s.proximosPassos  = m9 ? m9[1].trim() : "";
  s.recomendacao    = (txt.match(/### RECOMENDA[CÇ][AÃ]O FINAL\s*\*\*(.+?)\*\*/) || [])[1] || "";
  s.recomendacaoDesc= (txt.match(/### RECOMENDA[CÇ][AÃ]O FINAL\s*\*\*.+?\*\* - (.+)/) || [])[1] || "";
  const fm = txt.match(/### RESUMO PARA SUBMISS[AÃ]O AO FORMS\n([\s\S]+)$/);
  s.resumoForms = fm ? fm[1].trim() : ((txt.match(/(IDEIA:[\s\S]+RECOMENDA[CÇ][AÃ]O DA SKILL:.+)/) || [])[1] || "");
  return s;
};

const supa = async (path, opts={}) => {
  const {method="GET", body, prefer} = opts;
  const headers = {"apikey":SKEY,"Authorization":"Bearer "+SKEY,"Content-Type":"application/json"};
  if (prefer) headers["Prefer"] = prefer;
  const res = await fetch(SURL+"/rest/v1/"+path, {method, headers, body: body ? JSON.stringify(body) : undefined});
  if (!res.ok) { const t = await res.text().catch(()=>res.status.toString()); throw new Error(t.substring(0,200)); }
  const t = await res.text();
  return t ? JSON.parse(t) : null;
};

      });
      setPlanDraft(etapasGeradas);

    } catch(e) { alert("Erro ao gerar análise:\n\n"+e.message); }
    finally { setGenerating(false); }
  };

  const confirmarRascunho = async () => {
    setSaving(true);
    await patch(detail.id, { analise_smart: smartDraft, planejamento: planDraft });
    setSmartDraft(null); setPlanDraft(null);
    setSaving(false);
  };

  const addEtapa = async () => {
    if (!form.titulo.trim()) return;
    const nova = { ...form, id: Date.now().toString() };
    await savePlan([...etapas, nova]);
    setForm(EMPTY_ETAPA); setAdding(false);
  };

  const updateEtapa = async (id, fields) => {
    await savePlan(etapas.map(e => e.id===id ? {...e,...fields} : e));
    setEditingId(null);
  };

  const removeEtapa = async (id) => {
    if (!confirm("Remover esta etapa?")) return;
    await savePlan(etapas.filter(e => e.id!==id));
  };

  const importFromCanvas = async () => {
    const roadmap = detail.analise_canvas?.roadmap || "";
    if (!roadmap) { alert("Gere o Canvas IA primeiro."); return; }
    const linhas = roadmap.split("\n").filter(l => l.match(/^\s*-?\s*\[?\s*\]?\s*.+/));
    const faseAtual = { nome:"Fase 1" };
    const novas = [];
    linhas.forEach(l => {
      const fm = l.match(/FASE\s*(\d+)[:\s]*(.+)?/i);
      if (fm) { faseAtual.nome = "Fase "+fm[1]; return; }
      const titulo = l.replace(/^\s*-?\s*\[?\s*[xX ]?\s*\]?\s*/,"").trim();
      if (titulo.length < 3) return;
      novas.push({ id:Date.now().toString()+Math.random(), titulo, responsavel:"", prazo:"", fase:faseAtual.nome, status:"A fazer", origem:"canvas" });
    });
    if (!novas.length) { alert("Não foi possível extrair etapas do roadmap."); return; }
    await savePlan([...etapas.filter(e=>e.origem!=="canvas"), ...novas]);
  };

  const STA_ETAPA = {
    "A fazer":      { bg:"#F1F5F9", color:"#475569", border:"#CBD5E1" },
    "Em andamento": { bg:"#FFFBEB", color:"#D97706", border:"#FDE68A" },
    "Concluído":    { bg:"#EDFCF5", color:"#065F46", border:"#A7F3D0" },
  };
  const FASES        = ["Fase 1","Fase 2","Fase 3","Outro"];
  const STATUS_ETAPA = ["A fazer","Em andamento","Concluído"];
  const fases   = [...new Set(etapas.map(e=>e.fase||"Fase 1"))].sort();
  const porFase = fases.map(f=>({ fase:f, itens:etapas.filter(e=>(e.fase||"Fase 1")===f) }));
  const concluidos = etapas.filter(e=>e.status==="Concluído").length;

  const FieldIn = ({label,val,onChange,type="text",placeholder=""}) => html`
    <div>
      <p style="color:#9193A0;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px">${label}</p>
      <input type=${type} value=${val} onChange=${onChange} placeholder=${placeholder}
        style="width:100%;padding:7px 10px;background:#F7F9FC;border:1px solid #E8ECF1;border-radius:8px;color:#1C1C1C;font-size:12px;outline:none;box-sizing:border-box" />
    </div>`;

  const EtapaForm = ({vals,setVals,onSave,onCancel,saveLabel="Adicionar"}) => html`
    <div style="background:#F7F9FC;border:1px solid #E8ECF1;border-radius:10px;padding:12px;display:flex;flex-direction:column;gap:8px">
      ${FieldIn({label:"Título *",val:vals.titulo,onChange:e=>setVals(p=>({...p,titulo:e.target.value})),placeholder:"Ex: Configurar ambiente"})}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        ${FieldIn({label:"Responsável",val:vals.responsavel,onChange:e=>setVals(p=>({...p,responsavel:e.target.value})),placeholder:"Ex: Natalia"})}
        ${FieldIn({label:"Prazo",val:vals.prazo,onChange:e=>setVals(p=>({...p,prazo:e.target.value})),type:"date"})}
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div>
          <p style="color:#9193A0;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px">Fase</p>
          <select value=${vals.fase} onChange=${e=>setVals(p=>({...p,fase:e.target.value}))}
            style="width:100%;padding:7px 26px 7px 10px;background:#F7F9FC;border:1px solid #E8ECF1;border-radius:8px;color:#1C1C1C;font-size:12px;outline:none;cursor:pointer;box-sizing:border-box">
            ${FASES.map(f=>html`<option key=${f} value=${f}>${f}</option>`)}
          </select>
        </div>
        <div>
          <p style="color:#9193A0;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px">Status</p>
          <select value=${vals.status} onChange=${e=>setVals(p=>({...p,status:e.target.value}))}
            style="width:100%;padding:7px 26px 7px 10px;background:#F7F9FC;border:1px solid #E8ECF1;border-radius:8px;color:#1C1C1C;font-size:12px;outline:none;cursor:pointer;box-sizing:border-box">
            ${STATUS_ETAPA.map(s=>html`<option key=${s} value=${s}>${s}</option>`)}
          </select>
        </div>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:4px">
        <button onClick=${onCancel}
          style="padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;background:#fff;color:#9193A0;border:1px solid #E8ECF1;font-family:'Plus Jakarta Sans',sans-serif">
          Cancelar
        </button>
        <button onClick=${onSave} disabled=${!vals.titulo.trim()||saving}
          style=${"padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:'Plus Jakarta Sans',sans-serif;"+(vals.titulo.trim()?"background:#009FCF;color:#fff":"background:#F1F5F9;color:#C0C4CC;cursor:not-allowed")}>
          ${saving?"Salvando…":saveLabel}
        </button>
      </div>
    </div>`;

  return html`
    <div style="display:flex;flex-direction:column;gap:20px">

      <!-- BOTÃO GERAR IA -->
      ${!smartDraft ? html`
        <div style="display:flex;flex-direction:column;gap:8px">
          <div style=${"display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;padding:14px 16px;background:"+(smart?"#F7F9FC":"#E5F6FB")+";border:1px solid "+(smart?"#E8ECF1":"#B3E4F5")+";border-radius:12px"}>
            <div>
              <p style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:13px;color:#1C1C1C;margin:0 0 2px">
                ${smart ? "Análise SMART + Plano gerado pela IA" : "Gerar Análise SMART + Plano de Desenvolvimento"}
              </p>
              <p style="font-size:11px;color:#9193A0;margin:0">
                ${smart ? "Gerado em "+new Date(smart.gerado_em).toLocaleDateString("pt-BR")+" — clique para regenerar" : "A IA estrutura os critérios SMART e monta um plano com fases e tarefas editáveis"}
              </p>
            </div>
            <button onClick=${gerarSmartEPlano} disabled=${generating}
              style=${"display:flex;align-items:center;gap:6px;padding:9px 18px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:'Plus Jakarta Sans',sans-serif;transition:all .15s;"+(generating?"background:#F1F5F9;color:#C0C4CC;cursor:not-allowed":"background:#009FCF;color:#fff;box-shadow:0 4px 12px rgba(0,159,207,0.25)")}>
              ${generating ? html`
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" class="spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
                Gerando… (30–60s)` : html`
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                ${smart ? "Regenerar SMART + Plano" : "Gerar SMART + Plano"}`}
            </button>
          </div>
          ${(()=>{
            const dv = detail.declaracao_visao || {};
            const campos = [
              dv.objetivo   && "Objetivo",
              dv.kpis       && "KPIs",
              dv.deadline   && "Deadline ("+dv.deadline+")",
              dv.viabilidade && "Viabilidade",
              dv.okr_rel    && "OKR relacionada",
            ].filter(Boolean);
            if (!campos.length) return null;
            return html`
              <div style="display:flex;align-items:flex-start;gap:8px;padding:10px 12px;background:#EDFCF5;border:1px solid #A7F3D0;border-radius:10px">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#065F46" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:1px"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 10.99"/></svg>
                <div>
                  <p style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:11px;color:#065F46;margin:0 0 2px">
                    Usando contexto da Declaração de Visão
                  </p>
                  <p style="font-size:11px;color:#065F46;margin:0;line-height:1.5">
                    A IA vai usar os campos já preenchidos pelo time: <strong>${campos.join(", ")}</strong>. O SMART gerado vai respeitar essas definições em vez de inventar do zero.
                  </p>
                </div>
              </div>`;
          })()}
        </div>` : null}

      <!-- RASCUNHO IA -->
      ${smartDraft ? html`
        <div style="display:flex;flex-direction:column;gap:12px;padding:16px;background:#F7F9FC;border:2px solid #009FCF;border-radius:14px">
          <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
            <p style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:13px;color:#009FCF;margin:0">✨ Sugestão da IA — revise e confirme</p>
            <div style="display:flex;gap:8px">
              <button onClick=${()=>{ setSmartDraft(null); setPlanDraft(null); }}
                style="padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;background:#fff;color:#9193A0;border:1px solid #E8ECF1;font-family:'Plus Jakarta Sans',sans-serif">
                Descartar
              </button>
              <button onClick=${confirmarRascunho} disabled=${saving}
                style="padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;background:#00BE8C;color:#fff;border:none;font-family:'Plus Jakarta Sans',sans-serif">
                ${saving?"Salvando…":"✓ Confirmar e salvar"}
              </button>
            </div>
          </div>

          <div style="display:flex;flex-direction:column;gap:8px">
            ${SMART_KEYS.map(({key,label,hint})=>html`
              <div key=${key} style="background:#fff;border:1px solid #E8ECF1;border-radius:10px;padding:10px 12px">
                <p style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:11px;color:#009FCF;margin:0 0 2px">${label}</p>
                <p style="color:#9193A0;font-size:10px;margin:0 0 6px;font-style:italic">${hint}</p>
                <textarea value=${smartDraft[key]}
                  onChange=${e=>setSmartDraft(p=>({...p,[key]:e.target.value}))}
                  rows="2"
                  style="width:100%;padding:7px 10px;background:#F7F9FC;border:1px solid #E8ECF1;border-radius:8px;color:#1C1C1C;font-size:12px;outline:none;resize:vertical;box-sizing:border-box;font-family:'Inter',sans-serif;line-height:1.5">
                </textarea>
              </div>`)}
          </div>

          ${planDraft && planDraft.length ? html`
            <div>
              <p style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:12px;color:#1C1C1C;margin:0 0 8px">Plano sugerido — ${planDraft.length} etapas</p>
              <div style="display:flex;flex-direction:column;gap:4px">
                ${planDraft.map((e,idx)=>html`
                  <div key=${e.id} style="display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #E8ECF1;border-radius:8px;padding:8px 10px">
                    <span style="font-family:'Plus Jakarta Sans',sans-serif;font-size:10px;font-weight:700;color:#009FCF;background:#E5F6FB;padding:2px 6px;border-radius:6px;flex-shrink:0">${e.fase}</span>
                    <span style="flex:1;font-size:12px;color:#1C1C1C">${e.titulo}</span>
                    ${e.responsavel ? html`<span style="font-size:11px;color:#9193A0">👤 ${e.responsavel}</span>` : null}
                    ${e.prazo ? html`<span style="font-size:11px;color:#9193A0">📅 ${new Date(e.prazo+"T00:00:00").toLocaleDateString("pt-BR")}</span>` : null}
                    <button onClick=${()=>setPlanDraft(p=>p.filter((_,i)=>i!==idx))}
                      style="background:none;border:none;cursor:pointer;color:#C0C4CC;padding:2px;flex-shrink:0"
                      onMouseEnter=${ev=>ev.currentTarget.style.color="#F73A60"}
                      onMouseLeave=${ev=>ev.currentTarget.style.color="#C0C4CC"}>
                      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18"/><path d="M6 6l12 12"/></svg>
                    </button>
                  </div>`)}
              </div>
            </div>` : null}
        </div>` : null}

      <!-- SMART SALVO -->
      ${smart && !smartDraft ? html`
        <div style="background:#F7F9FC;border:1px solid #E8ECF1;border-radius:12px;padding:14px 16px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
            <p style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:12px;color:#1C1C1C;margin:0">Análise SMART</p>
            <button onClick=${()=>setEditSmart(!editSmart)}
              style=${"display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;background:"+(editSmart?"#E5F6FB":"#fff")+";color:"+(editSmart?"#009FCF":"#9193A0")+";border:1px solid "+(editSmart?"#009FCF":"#E8ECF1")}>
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              ${editSmart?"Concluir":"Editar"}
            </button>
          </div>
          <div style="display:flex;flex-direction:column;gap:6px">
            ${SMART_KEYS.map(({key,label})=>html`
              <div key=${key} style=${"display:grid;grid-template-columns:140px 1fr;gap:8px;align-items:"+(editSmart?"start":"center")}>
                <span style="font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:700;color:#009FCF">${label}</span>
                ${editSmart ? html`
                  <textarea value=${smart[key]}
                    onChange=${async e=>{ const u={...smart,[key]:e.target.value}; await saveSmart(u); }}
                    rows="2"
                    style="padding:6px 8px;background:#fff;border:1px solid #E8ECF1;border-radius:8px;color:#1C1C1C;font-size:12px;outline:none;resize:vertical;box-sizing:border-box;font-family:'Inter',sans-serif;line-height:1.5;width:100%">
                  </textarea>` : html`
                  <p style="font-size:12px;color:#4A4A4A;margin:0;line-height:1.55">${smart[key]}</p>`}
              </div>`)}
          </div>
        </div>` : null}

      <!-- PROGRESSO + AÇÕES -->
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">
        <div style="flex:1;min-width:160px">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
            <span style="font-size:12px;color:#9193A0">${concluidos} de ${etapas.length} etapas concluídas</span>
            ${etapas.length ? html`<span style="font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:700;color:#009FCF">${Math.round(concluidos/etapas.length*100)}%</span>` : null}
          </div>
          ${etapas.length ? html`
            <div style="height:6px;background:#F1F5F9;border-radius:999px;overflow:hidden">
              <div style=${"height:100%;background:#009FCF;border-radius:999px;width:"+Math.round(concluidos/etapas.length*100)+"%"}></div>
            </div>` : null}
        </div>
        <div style="display:flex;gap:8px">
          ${detail.analise_canvas && !smartDraft ? html`
            <button onClick=${importFromCanvas}
              style="display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;background:#E5F6FB;color:#009FCF;border:1px solid #B3E4F5;font-family:'Plus Jakarta Sans',sans-serif">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
              Importar Canvas
            </button>` : null}
          <button onClick=${()=>{ setForm(EMPTY_ETAPA); setAdding(true); setEditingId(null); }}
            style="display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;background:#009FCF;color:#fff;border:none;font-family:'Plus Jakarta Sans',sans-serif">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
            Nova etapa
          </button>
        </div>
      </div>

      ${adding ? html`${EtapaForm({vals:form,setVals:setForm,onSave:addEtapa,onCancel:()=>setAdding(false),saveLabel:"Adicionar"})}` : null}

      ${etapas.length===0 && !adding ? html`
        <div style="text-align:center;padding:32px 0;color:#9193A0">
          <p style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;font-size:14px;color:#4A4A4A;margin-bottom:6px">Nenhuma etapa ainda</p>
          <p style="font-size:12px">Use "Gerar SMART + Plano" para a IA estruturar o projeto, ou adicione manualmente.</p>
        </div>` : null}

      ${porFase.map(({fase,itens})=>html`
        <div key=${fase}>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            <span style="width:3px;height:14px;background:#009FCF;border-radius:2px;display:inline-block;flex-shrink:0"></span>
            <h3 style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:12px;color:#1C1C1C;margin:0">${fase}</h3>
            <span style="color:#C0C4CC;font-size:11px">${itens.filter(e=>e.status==="Concluído").length}/${itens.length}</span>
          </div>
          <div style="display:flex;flex-direction:column;gap:6px">
            ${itens.map(e=>{
              const st = STA_ETAPA[e.status]||STA_ETAPA["A fazer"];
              const isEditing = editingId===e.id;
              const [ef,setEf] = useState({...e});
              return html`
                <div key=${e.id} style=${"background:#fff;border:1px solid "+(e.status==="Concluído"?"#A7F3D0":"#E8ECF1")+";border-radius:10px;padding:10px 12px;display:flex;flex-direction:column;gap:8px"}>
                  ${isEditing ? html`
                    ${EtapaForm({vals:ef,setVals:setEf,onSave:()=>updateEtapa(e.id,ef),onCancel:()=>setEditingId(null),saveLabel:"Salvar"})}
                  ` : html`
                    <div style="display:flex;align-items:flex-start;gap:8px">
                      <button onClick=${()=>updateEtapa(e.id,{status:e.status==="Concluído"?"A fazer":"Concluído"})}
                        style=${"width:16px;height:16px;border-radius:4px;border:2px solid;cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;background:"+(e.status==="Concluído"?"#00BE8C":"#fff")+";border-color:"+(e.status==="Concluído"?"#00BE8C":"#CBD5E1")}>
                        ${e.status==="Concluído" ? html`<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>` : null}
                      </button>
                      <div style="flex:1;min-width:0">
                        <p style=${"font-size:12px;font-weight:600;color:"+(e.status==="Concluído"?"#9193A0":"#1C1C1C")+";text-decoration:"+(e.status==="Concluído"?"line-through":"none")+";margin-bottom:3px"}>${e.titulo}</p>
                        <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center">
                          ${e.responsavel ? html`<span style="font-size:11px;color:#9193A0">👤 ${e.responsavel}</span>` : null}
                          ${e.prazo ? html`<span style="font-size:11px;color:#9193A0">📅 ${new Date(e.prazo+"T00:00:00").toLocaleDateString("pt-BR")}</span>` : null}
                          ${e.origem==="canvas" ? html`<span style="background:#E5F6FB;color:#009FCF;border:1px solid #B3E4F5;font-size:9px;font-weight:700;padding:1px 6px;border-radius:999px;font-family:'Plus Jakarta Sans',sans-serif">Canvas</span>` : null}
                          ${e.origem==="smart-ia" ? html`<span style="background:#F5F0FF;color:#6D28D9;border:1px solid #DDD6FE;font-size:9px;font-weight:700;padding:1px 6px;border-radius:999px;font-family:'Plus Jakarta Sans',sans-serif">✨ IA</span>` : null}
                        </div>
                      </div>
                      <select value=${e.status} onChange=${ev=>updateEtapa(e.id,{status:ev.target.value})}
                        style=${"font-family:'Plus Jakarta Sans',sans-serif;font-size:10px;font-weight:700;padding:2px 20px 2px 8px;border-radius:999px;border:1px solid;cursor:pointer;outline:none;background:"+st.bg+";color:"+st.color+";border-color:"+st.border}>
                        ${STATUS_ETAPA.map(s=>html`<option key=${s} value=${s}>${s}</option>`)}
                      </select>
                      <div style="display:flex;gap:2px;flex-shrink:0">
                        <button onClick=${()=>{ setEf({...e}); setEditingId(e.id); setAdding(false); }}
                          style="background:none;border:none;cursor:pointer;color:#C0C4CC;padding:2px"
                          onMouseEnter=${ev=>ev.currentTarget.style.color="#009FCF"}
                          onMouseLeave=${ev=>ev.currentTarget.style.color="#C0C4CC"}>
                          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                        </button>
                        <button onClick=${()=>removeEtapa(e.id)}
                          style="background:none;border:none;cursor:pointer;color:#C0C4CC;padding:2px"
                          onMouseEnter=${ev=>ev.currentTarget.style.color="#F73A60"}
                          onMouseLeave=${ev=>ev.currentTarget.style.color="#C0C4CC"}>
                          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18"/><path d="M6 6l12 12"/></svg>
                        </button>
                      </div>
                    </div>
                  `}
                </div>`; })}
          </div>
        </div>`)}
    </div>`;
}

function App() {
  const [iniciativas, setIniciativas] = useState([]);
  const [clusters,    setClusters]    = useState([]);
  const [squads,      setSquads]      = useState([]);
  const [sqModal,     setSqModal]     = useState(false);
  const [newSq,       setNewSq]       = useState({nome:"",membros:""});
  const [loading,     setLoading]     = useState(true);
  const [error,       setError]       = useState(null);
  const [view,        setView]        = useState("lista");
  const [filters,     setFilters]     = useState({area:"",okr:"",classificacao:"",status:"",prioridade:"",cluster:"",squad:""});
  const [groupBy,     setGroupBy]     = useState("");
  const [detailId,    setDetailId]    = useState(null);
  const [detailTab,   setDetailTab]   = useState("iniciativa");
  const [cModal,      setCModal]      = useState(false);
  const [newC,        setNewC]        = useState({nome:"",descricao:"",cor:CLR_CLUST[0],prioridade:"Media"});
  const [editingClusterPri,  setEditingClusterPri]  = useState(null);
  const [editingClusterName, setEditingClusterName] = useState(null);
  const [niModal,     setNiModal]     = useState(false);
  const [niSaving,    setNiSaving]    = useState(false);
  const EMPTY_NI = {nome_colaborador:"",area:AREAS[0],problema:"",impacto:"",tempo_manual:"",apoio_ai_lead:"Talvez",tipo:"",classificacao:"Projeto",okr:"OKR 2 Margem",complexidade:3,prioridade:"Alta",status:"Backlog",notas:""};
  const [newNi,       setNewNi]       = useState(EMPTY_NI);
  const [saving,      setSaving]      = useState(null);

  useEffect(()=>{ init(); },[]);

  const init = async () => {
    setLoading(true); setError(null);
    try {
      const [ini,cls,sqs] = await Promise.all([
        supa("iniciativas?select=*&order=num.asc"),
        supa("clusters?select=*&order=created_at.asc"),
        supa("squads?select=*&order=created_at.asc"),
      ]);
      setClusters(cls||[]);
      setSquads(sqs||[]);
      if (!ini || ini.length===0) {
        await supa("iniciativas",{method:"POST",body:SEED,prefer:"return=minimal"});
        const seeded = await supa("iniciativas?select=*&order=num.asc");
        setIniciativas(seeded||[]);
      } else { setIniciativas(ini); }
    } catch(e) { setError(e.message); }
    finally { setLoading(false); }
  };

  const patch = async (id, fields) => {
    setSaving(id);
    try {
      await supa("iniciativas?id=eq."+id, {method:"PATCH",body:fields});
      setIniciativas(p=>p.map(i=>i.id===id?{...i,...fields}:i));
    } catch(e) { alert("Erro: "+e.message); }
    finally { setSaving(null); }
  };

  const createIniciativa = async () => {
    if (!newNi.problema.trim() || !newNi.nome_colaborador.trim()) return;
    setNiSaving(true);
    try {
      const nextNum = iniciativas.length > 0 ? Math.max(...iniciativas.map(i=>i.num||0)) + 1 : 1;
      const [created] = await supa("iniciativas",{method:"POST",body:{...newNi,num:nextNum},prefer:"return=representation"});
      setIniciativas(p=>[...p,created]);
      setNiModal(false); setNewNi(EMPTY_NI);
    } catch(e) { alert("Erro ao criar iniciativa: "+e.message); }
    finally { setNiSaving(false); }
  };

  const exportCSV = () => {
    const hdr = ["#","Nome","Area","Classificacao","Tipo","OKR","Complexidade","Prioridade","Status","Tempo Manual","Apoio AI Lead","Cluster","SMART","Plano","Problema"];
    const rows = iniciativas.map(i=>{
      const cl = clusters.find(c=>c.id===i.cluster_id);
      return [i.num,i.nome_colaborador,i.area,i.classificacao,i.tipo,i.okr,i.complexidade,i.prioridade,i.status,i.tempo_manual,i.apoio_ai_lead,cl?.nome||"",i.analise_smart?"Sim":"Nao",i.planejamento?.length||0,'"'+(i.problema||"").replace(/"/g,'""')+'"'].join(",");
    });
    const csv = [hdr.join(","),...rows].join("\n");
    const blob = new Blob([csv],{type:"text/csv;charset=utf-8"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href=url; a.download="iniciativas-ia-etcfilmes.csv";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),3000);
  };

  const patchCluster = async (cid, fields) => {
    try {
      await supa("clusters?id=eq."+cid, {method:"PATCH",body:fields});
      setClusters(p=>p.map(c=>c.id===cid?{...c,...fields}:c));
    } catch(e) { alert("Erro ao atualizar cluster: "+e.message); }
  };

  const createCluster = async () => {
    if (!newC.nome.trim()) return;
    try {
      const [c] = await supa("clusters",{method:"POST",body:newC,prefer:"return=representation"});
      setClusters(p=>[...p,c]); setNewC({nome:"",descricao:"",cor:CLR_CLUST[0],prioridade:"Media"});
    } catch(e) { alert("Erro: "+e.message); }
  };

  const deleteCluster = async (cid) => {
    if (!confirm("Remover cluster? As iniciativas não serão excluídas.")) return;
    try {
      await supa("iniciativas?cluster_id=eq."+cid,{method:"PATCH",body:{cluster_id:null}});
      await supa("clusters?id=eq."+cid,{method:"DELETE"});
      setClusters(p=>p.filter(c=>c.id!==cid));
      setIniciativas(p=>p.map(i=>i.cluster_id===cid?{...i,cluster_id:null}:i));
    } catch(e) { alert("Erro: "+e.message); }
  };

  const createSquad = async () => {
    if (!newSq.nome.trim()) return;
    try {
      const [s] = await supa("squads",{method:"POST",body:newSq,prefer:"return=representation"});
      setSquads(p=>[...p,s]); setNewSq({nome:"",membros:""});
    } catch(e) { alert("Erro: "+e.message); }
  };

  const deleteSquad = async (sid) => {
    if (!confirm("Remover squad? As iniciativas não serão excluídas.")) return;
    try {
      await supa("iniciativas?squad_id=eq."+sid,{method:"PATCH",body:{squad_id:null}});
      await supa("squads?id=eq."+sid,{method:"DELETE"});
      setSquads(p=>p.filter(s=>s.id!==sid));
      setIniciativas(p=>p.map(i=>i.squad_id===sid?{...i,squad_id:null}:i));
    } catch(e) { alert("Erro: "+e.message); }
  };

  const getCluster = (id) => clusters.find(c=>c.id===id);
  const getSquad   = (id) => squads.find(s=>s.id===id);
  const detail = detailId ? iniciativas.find(i=>i.id===detailId)||null : null;

  const filtered = useMemo(()=>iniciativas.filter(i=>{
    if (filters.area          && i.area!==filters.area)                      return false;
    if (filters.okr           && i.okr!==filters.okr)                        return false;
    if (filters.classificacao && i.classificacao!==filters.classificacao)    return false;
    if (filters.status        && i.status!==filters.status)                  return false;
    if (filters.prioridade    && i.prioridade!==filters.prioridade)          return false;
    if (filters.cluster==="__none__" && i.cluster_id)                        return false;
    if (filters.cluster && filters.cluster!=="__none__" && i.cluster_id!==filters.cluster) return false;
    if (filters.squad==="__none__"  && i.squad_id)                           return false;
    if (filters.squad && filters.squad!=="__none__" && i.squad_id!==filters.squad) return false;
    return true;
  }),[iniciativas,filters]);

  const stats = useMemo(()=>({
    projetos:  iniciativas.filter(i=>i.classificacao==="Projeto").length,
    tarefas:   iniciativas.filter(i=>i.classificacao==="Tarefa").length,
    ideias:    iniciativas.filter(i=>i.classificacao==="Ideia").length,
    okr1:      iniciativas.filter(i=>i.okr==="OKR 1 Receita").length,
    okr2:      iniciativas.filter(i=>i.okr==="OKR 2 Margem").length,
    comSmart:  iniciativas.filter(i=>i.analise_smart).length,
    alta:      iniciativas.filter(i=>i.prioridade==="Alta").length,
  }),[iniciativas]);

  /* ── STAT CARD ── */
  const SC = ({n,label,color,bg}) => html`
    <div class="stat-card" style=${"background:"+bg}>
      <span style=${"font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:18px;color:"+color+";line-height:1"}>${n}</span>
      <span style="font-size:11px;color:#9193A0;font-weight:500">${label}</span>
    </div>`;

  /* ── CARD ── */
  const Card = (ini) => {
    const cl = getCluster(ini.cluster_id);
    const sq = getSquad(ini.squad_id);
    const cs = CLF[ini.classificacao]  || CLF.Projeto;
    const os = OKR[ini.okr]            || OKR.Transversal;
    const ss = STA[ini.status]         || STA.Backlog;
    const etapas    = ini.planejamento || [];
    const concluidas = etapas.filter(e=>e.status==="Concluído").length;
    return html`
      <div class="card" style=${cl ? "border-left:3px solid "+cl.cor : ""}
        onClick=${()=>{ setDetailId(ini.id); setDetailTab("iniciativa"); }}>
        <div class="flex items-start justify-between gap-2">
          <div class="flex items-center gap-1.5">
            <span class="text-xs font-mono font-bold" style="color:#9193A0">#${String(ini.num).padStart(2,"0")}</span>
            ${ini.analise_smart ? html`<span class="pill" style="background:#F5F0FF;color:#6D28D9;border-color:#DDD6FE;font-size:9px">✨ SMART</span>` : null}
          </div>
          <div class="flex flex-wrap gap-1 justify-end">
            ${Pill({text:ini.classificacao, s:cs})}
            ${Pill({text:ini.okr==="OKR 1 Receita"?"OKR 1":ini.okr==="OKR 2 Margem"?"OKR 2":"Trans.", s:os})}
          </div>
        </div>
        <p class="text-xs leading-relaxed lc3" style="color:#1C1C1C">${ini.problema}</p>
        <div class="flex items-center justify-between pt-2" style="border-top:1px solid #F1F5F9">
          <div class="flex items-center gap-2">
            <span class="text-xs font-medium px-1.5 py-0.5 rounded" style="background:#F1F5F9;color:#9193A0;font-size:10px">${ini.area}</span>
            ${Dot(ini.complexidade)}
          </div>
          ${Pill({text:ini.status, s:ss})}
        </div>
        ${etapas.length > 0 ? html`
          <div style="display:flex;align-items:center;gap:6px">
            <div style="flex:1;height:4px;background:#F1F5F9;border-radius:999px;overflow:hidden">
              <div style=${"height:100%;background:#009FCF;border-radius:999px;width:"+Math.round(concluidas/etapas.length*100)+"%"}></div>
            </div>
            <span style="font-size:10px;color:#9193A0;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600">${concluidas}/${etapas.length}</span>
          </div>` : null}
        <div class="flex items-center gap-3" style="flex-wrap:wrap">
          ${cl ? html`
            <div class="flex items-center gap-1">
              <span class="rounded-full" style=${"width:6px;height:6px;background:"+cl.cor+";display:inline-block;flex-shrink:0"}></span>
              <span class="text-xs lc1" style="color:#9193A0">${cl.nome}</span>
            </div>` : null}
          ${sq ? html`
            <div class="flex items-center gap-1">
              <span style="font-size:10px">👥</span>
              <span class="text-xs" style="color:#009FCF;font-weight:600">${sq.nome}</span>
            </div>` : null}
        </div>
        <p class="text-xs" style="color:#C0C4CC">${(ini.nome_colaborador||"").split(" ").slice(0,2).join(" ")}</p>
      </div>`;
  };

  const ChoiceRow = ({opts,val,styleMap,onPick}) => html`
    <div class="flex flex-wrap gap-2">
      ${opts.map(o=>{
        const s=styleMap?styleMap[o]:null; const act=val===o;
        return html`
          <button key=${o} class="choice-btn"
            style=${act&&s?"background:"+s.bg+";color:"+s.color+";border-color:"+s.border:act?"background:#E5F6FB;color:#009FCF;border-color:#009FCF":""}
            onClick=${()=>onPick(o)}>${o}</button>`;
      })}
    </div>`;

  const SL = (txt) => html`<p class="section-label">${txt}</p>`;

  /* ── LOADING / ERROR ── */
  if (loading) return html`
    <div class="min-h-screen flex flex-col items-center justify-center gap-4" style="background:#F7F9FC">
      ${IconLoader(32)}
      <p style="color:#9193A0;font-size:13px">Conectando ao Supabase…</p>
    </div>`;

  if (error) return html`
    <div class="min-h-screen flex flex-col items-center justify-center gap-4 p-8" style="background:#F7F9FC">
      <span style="color:#F73A60">${IconAlert(32)}</span>
      <p style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;color:#1C1C1C;font-size:16px">Erro ao conectar ao Supabase</p>
      <p style="color:#9193A0;font-size:13px;text-align:center;max-width:400px">${error}</p>
      <button onClick=${init} style="padding:8px 20px;background:#009FCF;color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-size:13px;font-family:'Plus Jakarta Sans',sans-serif">Tentar novamente</button>
    </div>`;

  return html`
    <div class="min-h-screen flex flex-col" style="background:#F7F9FC">

      <!-- HEADER -->
      <div class="flex items-center justify-between flex-wrap gap-4 px-6 py-4" style="background:#fff;border-bottom:1px solid #E8ECF1">
        <div>
          <div class="flex items-center mb-1">
            ${Dots()}
            <span style="color:#009FCF;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;font-family:'Plus Jakarta Sans',sans-serif">ETC Filmes · Iniciativas de IA</span>
          </div>
          <h1 style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:22px;color:#1C1C1C;margin:0 0 2px">Painel de Iniciativas de IA</h1>
          <p style="color:#9193A0;font-size:12px;margin:0">${iniciativas.length} iniciativas · ${clusters.length} clusters · ${stats.comSmart} com SMART ✨</p>
        </div>
        <div class="flex flex-wrap gap-2 items-center">
          <button class="btn-nav btn-nav-default" onClick=${()=>{ setNewNi(EMPTY_NI); setNiModal(true); }} style="background:#009FCF;color:#fff;border-color:#009FCF">
            ${IconPlus(12)} Nova Iniciativa
          </button>
          <button class=${"btn-nav "+(view==="lista"?"btn-nav-active":"btn-nav-default")} onClick=${()=>setView("lista")}>${IconList(12)} Lista</button>
          <button class=${"btn-nav "+(view==="clusters"?"btn-nav-active":"btn-nav-default")} onClick=${()=>setView("clusters")}>${IconLayers(12)} Clusters</button>
          <button class="btn-nav btn-nav-default" onClick=${()=>setCModal(true)}>${IconPlus(12)} Cluster</button>
          <button class="btn-nav btn-nav-default" onClick=${()=>{ setNewSq({nome:"",membros:""}); setSqModal(true); }}>${IconPlus(12)} Squad</button>
          <button class="btn-nav btn-nav-default" onClick=${exportCSV}>${IconDL(12)} CSV</button>
        </div>
      </div>

      <!-- STATS -->
      <div class="flex flex-wrap gap-2 px-6 py-3 items-center" style="background:#fff;border-bottom:1px solid #E8ECF1">
        ${SC({n:stats.projetos, label:"Projetos",       color:"#C2410C", bg:"#FFF4ED"})}
        ${SC({n:stats.tarefas,  label:"Tarefas",        color:"#0369A1", bg:"#EFF8FF"})}
        ${SC({n:stats.ideias,   label:"Ideias",         color:"#6D28D9", bg:"#F5F0FF"})}
        <div style="width:1px;background:#E8ECF1;align-self:stretch;margin:0 4px"></div>
        ${SC({n:stats.okr1,     label:"OKR 1 Receita",  color:"#065F46", bg:"#EDFCF5"})}
        ${SC({n:stats.okr2,     label:"OKR 2 Margem",   color:"#5B21B6", bg:"#F5F0FF"})}
        <div style="width:1px;background:#E8ECF1;align-self:stretch;margin:0 4px"></div>
        ${SC({n:stats.alta,     label:"Alta Prioridade", color:"#F73A60", bg:"#FEE8ED"})}
        ${SC({n:stats.comSmart, label:"SMART ✨",         color:"#6D28D9", bg:"#F5F0FF"})}
        ${Object.values(filters).some(Boolean) ? html`<span style="margin-left:auto;color:#F5BC50;font-weight:700;font-size:12px;font-family:'Plus Jakarta Sans',sans-serif">${filtered.length} visíveis</span>` : null}
      </div>

      <!-- FILTERS + AGRUPAR -->
      <div class="flex flex-wrap gap-2 px-6 py-2.5 items-center" style="background:#fff;border-bottom:1px solid #E8ECF1">
        <span style="color:#9193A0;font-size:11px;font-weight:600;letter-spacing:.06em">FILTRAR</span>
        ${[{k:"area",opts:AREAS,ph:"Área"},{k:"classificacao",opts:CLASSIFS,ph:"Tipo"},{k:"okr",opts:OKRS,ph:"OKR"},{k:"prioridade",opts:PRIORS,ph:"Prioridade"},{k:"status",opts:STATUS_OPTS,ph:"Status"}].map(({k,opts,ph})=>html`
          <select key=${k} value=${filters[k]} onChange=${e=>setFilters(p=>({...p,[k]:e.target.value}))}
            style="background:#fff;border:1px solid #E8ECF1;color:#4A4A4A;font-size:12px;border-radius:8px;padding:6px 26px 6px 10px;outline:none;cursor:pointer">
            <option value="">${ph}</option>
            ${opts.map(o=>html`<option key=${o} value=${o}>${o}</option>`)}
          </select>`)}
        <select value=${filters.cluster} onChange=${e=>setFilters(p=>({...p,cluster:e.target.value}))}
          style="background:#fff;border:1px solid #E8ECF1;color:#4A4A4A;font-size:12px;border-radius:8px;padding:6px 26px 6px 10px;outline:none;cursor:pointer">
          <option value="">Cluster</option>
          <option value="__none__">Sem cluster</option>
          ${clusters.map(c=>html`<option key=${c.id} value=${c.id}>${c.nome}</option>`)}
        </select>
        <select value=${filters.squad} onChange=${e=>setFilters(p=>({...p,squad:e.target.value}))}
          style="background:#fff;border:1px solid #E8ECF1;color:#4A4A4A;font-size:12px;border-radius:8px;padding:6px 26px 6px 10px;outline:none;cursor:pointer">
          <option value="">Squad</option>
          <option value="__none__">Sem squad</option>
          ${squads.map(s=>html`<option key=${s.id} value=${s.id}>${s.nome}</option>`)}
        </select>
        ${Object.values(filters).some(Boolean) ? html`
          <button onClick=${()=>setFilters({area:"",okr:"",classificacao:"",status:"",prioridade:"",cluster:"",squad:""})}
            class="flex items-center gap-1" style="font-size:12px;color:#F73A60;font-weight:600;cursor:pointer;border:none;background:transparent;padding:4px 8px;border-radius:6px">
            ${IconX(10)} Limpar
          </button>` : null}

        <!-- divisor -->
        <div style="width:1px;background:#E8ECF1;align-self:stretch;margin:0 4px"></div>

        <!-- agrupar por -->
        <span style="color:#9193A0;font-size:11px;font-weight:600;letter-spacing:.06em">AGRUPAR</span>
        <div class="flex gap-1.5">
          ${[["","Nenhum"],["area","Departamento"],["status","Status"],["prioridade","Prioridade"],["classificacao","Tipo"],["okr","OKR"],["squad","Squad"]].map(([val,lbl])=>html`
            <button key=${val} onClick=${()=>setGroupBy(val)}
              style=${"padding:5px 10px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;border:1px solid;transition:all .15s;"
                +(groupBy===val?"background:#009FCF;color:#fff;border-color:#009FCF":"background:#fff;color:#9193A0;border-color:#E8ECF1")}>
              ${lbl}
            </button>`)}
        </div>
      </div>

      <!-- GRID -->
      <div class="flex-1 overflow-auto px-6 py-6">
        ${view==="lista" ? html`
          ${(()=>{
            /* ── sem agrupamento ── */
            if (!groupBy) return html`
              <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px">
                ${filtered.map(i=>Card(i))}
                ${filtered.length===0 ? html`
                  <div style="grid-column:1/-1;text-align:center;padding:64px 0;color:#9193A0">
                    <p style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:16px;color:#4A4A4A;margin-bottom:4px">Nenhuma iniciativa encontrada</p>
                    <p style="font-size:13px">Ajuste os filtros.</p>
                  </div>` : null}
              </div>`;

            /* ── config visual por critério ── */
            const GRP_CFG = {
              area:         { label: i=>i.area||"Sem área",       dot:"#009FCF", ordem: AREAS },
              status:       { label: i=>i.status||"Backlog",      dot: i=>(STA[i.status]||STA.Backlog).color, ordem: STATUS_OPTS },
              prioridade:   { label: i=>i.prioridade||"—",        dot: i=>({Alta:"#F73A60",Media:"#D97706",Baixa:"#475569"}[i.prioridade]||"#9193A0"), ordem: PRIORS },
              classificacao:{ label: i=>i.classificacao||"—",     dot: i=>(CLF[i.classificacao]||CLF.Projeto).color, ordem: CLASSIFS },
              okr:          { label: i=>i.okr||"—",               dot: i=>(OKR[i.okr]||OKR.Transversal).color, ordem: OKRS },
              squad:        { label: i=>getSquad(i.squad_id)?.nome||"Sem Squad", dot:"#00BE8C", ordem: squads.map(s=>s.nome) },
            };
            const cfg = GRP_CFG[groupBy] || GRP_CFG.area;

            /* calcular grupos na ordem definida */
            const grupos = [];
            const ordemBase = cfg.ordem || [];
            const valoresPresentes = [...new Set(filtered.map(i=>cfg.label(i)))];

              <button onClick=${()=>setNiModal(false)} style="padding:9px 18px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid #E8ECF1;background:#fff;color:#4A4A4A;font-family:'Plus Jakarta Sans',sans-serif">Cancelar</button>
              <button onClick=${createIniciativa} disabled=${niSaving||!newNi.problema.trim()||!newNi.nome_colaborador.trim()}
                style=${"padding:9px 20px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:'Plus Jakarta Sans',sans-serif;transition:all .15s;"+(niSaving||!newNi.problema.trim()||!newNi.nome_colaborador.trim()?"background:#F1F5F9;color:#C0C4CC;cursor:not-allowed":"background:#009FCF;color:#fff")}>
                ${niSaving?"Salvando…":"Salvar Iniciativa"}
              </button>
            </div>
          </div>
        </div>` : null}

      <!-- SQUAD MODAL -->
      ${sqModal ? html`
        <div class="modal-overlay" onClick=${()=>setSqModal(false)}>
          <div class="modal-box" style="max-width:420px;padding:24px" onClick=${e=>e.stopPropagation()}>
            <div class="flex items-center justify-between mb-5">
              <h3 style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:16px;color:#1C1C1C;margin:0">👥 Novo Squad</h3>
              <button onClick=${()=>setSqModal(false)} style="background:none;border:none;cursor:pointer;color:#C0C4CC">${IconX(18)}</button>
            </div>
            <div class="flex flex-col gap-4">
              <div>
                <label class="section-label" style="display:block">Nome do Squad *</label>
                <input type="text" value=${newSq.nome} onChange=${e=>setNewSq(p=>({...p,nome:e.target.value}))}
                  placeholder="Ex: Squad Automação Financeira"
                  style="width:100%;padding:10px 14px;background:#F7F9FC;border:1px solid #E8ECF1;border-radius:10px;color:#1C1C1C;font-size:13px;outline:none;box-sizing:border-box" />
              </div>
              <div>
                <label class="section-label" style="display:block">Participantes</label>
                <textarea value=${newSq.membros} onChange=${e=>setNewSq(p=>({...p,membros:e.target.value}))}
                  placeholder="Ex: Natalia, Eduardo, Camila"
                  rows="3"
                  style="width:100%;padding:10px 14px;background:#F7F9FC;border:1px solid #E8ECF1;border-radius:10px;color:#1C1C1C;font-size:13px;outline:none;resize:vertical;box-sizing:border-box;font-family:'Inter',sans-serif"></textarea>
              </div>

              ${squads.length>0 ? html`
                <div>
                  <label class="section-label" style="display:block">Squads existentes</label>
                  <div style="display:flex;flex-direction:column;gap:6px;max-height:160px;overflow-y:auto">
                    ${squads.map(s=>html`
                      <div key=${s.id} style="display:flex;align-items:flex-start;gap:8px;padding:8px 10px;background:#F7F9FC;border:1px solid #E8ECF1;border-radius:8px">
                        <span style="font-size:14px;flex-shrink:0">👥</span>
                        <div style="flex:1;min-width:0">
                          <p style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;font-size:12px;color:#1C1C1C;margin:0">${s.nome}</p>
                          ${s.membros ? html`<p style="font-size:11px;color:#9193A0;margin:0">${s.membros}</p>` : null}
                          <p style="font-size:10px;color:#C0C4CC;margin:2px 0 0">${iniciativas.filter(i=>i.squad_id===s.id).length} iniciativa(s)</p>
                        </div>
                        <button onClick=${()=>deleteSquad(s.id)}
                          style="background:none;border:none;cursor:pointer;color:#E8ECF1;padding:2px;flex-shrink:0"
                          onMouseEnter=${e=>e.currentTarget.style.color="#F73A60"}
                          onMouseLeave=${e=>e.currentTarget.style.color="#E8ECF1"}>
                          ${IconX(12)}
                        </button>
                      </div>`)}
                  </div>
                </div>` : null}

              <button onClick=${createSquad} disabled=${!newSq.nome.trim()}
                style=${"width:100%;padding:11px;border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .15s;"+(newSq.nome.trim()?"background:#009FCF;color:#fff":"background:#F1F5F9;color:#C0C4CC;cursor:not-allowed")}>
                Criar Squad
              </button>
            </div>
          </div>
        </div>` : null}

      <!-- CLUSTER MODAL -->
      ${cModal ? html`
        <div class="modal-overlay" onClick=${()=>setCModal(false)}>
          <div class="modal-box" style="max-width:420px;padding:24px" onClick=${e=>e.stopPropagation()}>
            <div class="flex items-center justify-between mb-5">
              <h3 style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:16px;color:#1C1C1C;margin:0">Novo Cluster</h3>
              <button onClick=${()=>setCModal(false)} style="background:none;border:none;cursor:pointer;color:#C0C4CC">${IconX(18)}</button>
            </div>
            <div class="flex flex-col gap-4">
              <div>
                <label class="section-label" style="display:block">Nome *</label>
                <input type="text" value=${newC.nome} onChange=${e=>setNewC(p=>({...p,nome:e.target.value}))} placeholder="Ex: Ecossistema de Atendimento"
                  style="width:100%;padding:10px 14px;background:#F7F9FC;border:1px solid #E8ECF1;border-radius:10px;color:#1C1C1C;font-size:13px;outline:none;box-sizing:border-box" />
              </div>
              <div>
                <label class="section-label" style="display:block">Descrição (opcional)</label>
                <input type="text" value=${newC.descricao} onChange=${e=>setNewC(p=>({...p,descricao:e.target.value}))}
                  style="width:100%;padding:10px 14px;background:#F7F9FC;border:1px solid #E8ECF1;border-radius:10px;color:#1C1C1C;font-size:13px;outline:none;box-sizing:border-box" />
              </div>
              <div>
                <label class="section-label" style="display:block">Cor</label>
                <div class="flex flex-wrap gap-2">
                  ${CLR_CLUST.map(c=>html`
                    <button key=${c} onClick=${()=>setNewC(p=>({...p,cor:c}))}
                      style=${"width:28px;height:28px;border-radius:50%;background:"+c+";cursor:pointer;transition:all .15s;border:"+(newC.cor===c?"3px solid #1C1C1C":"3px solid transparent")+";transform:"+(newC.cor===c?"scale(1.15)":"scale(1)")}>
                    </button>`)}
                </div>
              </div>
              <div>
                <label class="section-label" style="display:block">Prioridade do cluster</label>
                <div class="flex gap-2">
                  ${[["Alta","#F73A60","#FEE8ED","#FECDD3"],["Media","#D97706","#FFFBEB","#FDE68A"],["Baixa","#475569","#F1F5F9","#CBD5E1"]].map(([pr,clr,bg,bd])=>html`
                    <button key=${pr} onClick=${()=>setNewC(p=>({...p,prioridade:pr}))}
                      style=${"padding:6px 14px;border-radius:999px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;border:1px solid;transition:all .15s;"+(newC.prioridade===pr?"background:"+bg+";color:"+clr+";border-color:"+bd:"background:#fff;color:#9193A0;border-color:#E8ECF1")}>
                      ${pr}</button>`)})
                </div>
              </div>
              ${clusters.length>0 ? html`
                <div>
                  <label class="section-label" style="display:block">Clusters existentes</label>
                  <div style="display:flex;flex-direction:column;gap:6px;max-height:200px;overflow-y:auto">
                    ${clusters.map(c=>{
                      const pri=c.prioridade||"Media";
                      const priStyle=pri==="Alta"?"background:#FEE8ED;color:#F73A60;border-color:#FECDD3":pri==="Baixa"?"background:#F1F5F9;color:#475569;border-color:#CBD5E1":"background:#FFFBEB;color:#D97706;border-color:#FDE68A";
                      const isEP=editingClusterPri===c.id;
                      const isEN=editingClusterName?.id===c.id;
                      return html`
                        <div key=${c.id} style=${"display:flex;flex-direction:column;gap:4px;padding:6px 8px;border-radius:8px;background:"+(isEN?"#F7F9FC":"transparent")+";border:1px solid "+(isEN?"#E8ECF1":"transparent")}>
                          <div class="flex items-center gap-2" style="font-size:12px;color:#4A4A4A">
                            <span class="rounded-full" style=${"width:8px;height:8px;background:"+c.cor+";display:inline-block;flex-shrink:0"}></span>
                            <span style="flex:1">${c.nome}</span>
                            <button onClick=${()=>{ setEditingClusterPri(isEP?null:c.id); setEditingClusterName(null); }}
                              style=${"font-family:'Plus Jakarta Sans',sans-serif;font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;border:1px solid;cursor:pointer;transition:all .15s;"+priStyle}>${pri}</button>
                            <button onClick=${()=>{ setEditingClusterName(isEN?null:{id:c.id,nome:c.nome,descricao:c.descricao||""}); setEditingClusterPri(null); }}
                              style=${"background:none;border:none;cursor:pointer;padding:2px;color:"+(isEN?"#009FCF":"#C0C4CC")}
                              onMouseEnter=${e=>e.currentTarget.style.color="#009FCF"} onMouseLeave=${e=>e.currentTarget.style.color=isEN?"#009FCF":"#C0C4CC"}>
                              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                            </button>
                            <span style="color:#C0C4CC;font-size:11px">${iniciativas.filter(i=>i.cluster_id===c.id).length} ini.</span>
                            <button onClick=${()=>deleteCluster(c.id)} style="background:none;border:none;cursor:pointer;color:#E8ECF1;padding:2px"
                              onMouseEnter=${e=>e.currentTarget.style.color="#F73A60"} onMouseLeave=${e=>e.currentTarget.style.color="#E8ECF1"}>${IconX(12)}</button>
                          </div>
                          ${isEP ? html`
                            <div class="flex gap-1.5 pl-4">
                              ${[["Alta","#F73A60","#FEE8ED","#FECDD3"],["Media","#D97706","#FFFBEB","#FDE68A"],["Baixa","#475569","#F1F5F9","#CBD5E1"]].map(([pr,clr,bg,bd])=>html`
                                <button key=${pr} onClick=${async()=>{ await patchCluster(c.id,{prioridade:pr}); setEditingClusterPri(null); }}
                                  style=${"padding:4px 10px;border-radius:999px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;border:1px solid;transition:all .15s;"+(pri===pr?"background:"+bg+";color:"+clr+";border-color:"+bd:"background:#fff;color:#9193A0;border-color:#E8ECF1")}>
                                  ${pr}</button>`)}
                            </div>` : null}
                          ${isEN ? html`
                            <div style="display:flex;flex-direction:column;gap:6px;padding-left:16px;padding-top:2px">
                              <input type="text" value=${editingClusterName.nome} onChange=${e=>setEditingClusterName(p=>({...p,nome:e.target.value}))} placeholder="Nome"
                                style="width:100%;padding:6px 10px;background:#fff;border:1px solid #E8ECF1;border-radius:8px;color:#1C1C1C;font-size:12px;outline:none;box-sizing:border-box" />
                              <input type="text" value=${editingClusterName.descricao} onChange=${e=>setEditingClusterName(p=>({...p,descricao:e.target.value}))} placeholder="Descrição (opcional)"
                                style="width:100%;padding:6px 10px;background:#fff;border:1px solid #E8ECF1;border-radius:8px;color:#1C1C1C;font-size:12px;outline:none;box-sizing:border-box" />
                              <div class="flex gap-2">
                                <button disabled=${!editingClusterName.nome.trim()} onClick=${async()=>{ await patchCluster(c.id,{nome:editingClusterName.nome.trim(),descricao:editingClusterName.descricao}); setEditingClusterName(null); }}
                                  style=${"padding:5px 12px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;border:none;transition:all .15s;"+(editingClusterName.nome.trim()?"background:#009FCF;color:#fff":"background:#F1F5F9;color:#C0C4CC;cursor:not-allowed")}>
                                  Salvar</button>
                                <button onClick=${()=>setEditingClusterName(null)} style="padding:5px 12px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;background:#fff;color:#9193A0;border:1px solid #E8ECF1">Cancelar</button>
                              </div>
                            </div>` : null}
                        </div>`; })}
                  </div>
                </div>` : null}
              <button onClick=${createCluster} disabled=${!newC.nome.trim()}
                style=${"width:100%;padding:11px;border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .15s;"+(newC.nome.trim()?"background:#009FCF;color:#fff":"background:#F1F5F9;color:#C0C4CC;cursor:not-allowed")}>
                Criar Cluster
              </button>
            </div>
          </div>
        </div>` : null}
    </div>`;
}

function LoginGate({ onAuth }) {
  const [senha,   setSenha]   = useState("");
  const [erro,    setErro]    = useState(false);
  const [loading, setLoading] = useState(false);
  const [show,    setShow]    = useState(false);

  const tentar = () => {
    if (!senha.trim()) return;
    setLoading(true); setErro(false);
    setTimeout(() => {
      if (senha.trim() === "projetosetcfilmes#2026") {
        sessionStorage.setItem("painel_auth", "1");
        onAuth();
      } else {
        setErro(true);
        setLoading(false);
      }
    }, 400);
  };

  const onKey = (e) => { if (e.key === "Enter") tentar(); };

  return html`
    <div style="min-height:100vh;background:#F7F9FC;display:flex;align-items:center;justify-content:center;padding:24px">
      <div style="background:#fff;border:1px solid #E8ECF1;border-radius:20px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 8px 32px rgba(0,0,0,0.08)">

        <!-- logo / identidade -->
        <div style="text-align:center;margin-bottom:32px">
          <div style="display:inline-flex;gap:5px;align-items:center;margin-bottom:12px">
            ${["#F73A60","#00BE8C","#F5BC50","#009FCF"].map(c=>
              html`<span style=${"width:9px;height:9px;border-radius:50%;background:"+c+";display:inline-block"}></span>`
            )}
          </div>
          <p style="font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#009FCF;margin:0 0 6px">ETC Filmes</p>
          <h1 style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:20px;color:#1C1C1C;margin:0 0 6px">Painel de Iniciativas de IA</h1>
          <p style="font-size:12px;color:#9193A0;margin:0">Acesso restrito à equipe ETC</p>
        </div>

        <!-- campo senha -->
        <div style="margin-bottom:12px">
          <label style="color:#9193A0;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;display:block;margin-bottom:6px">Senha de acesso</label>
          <div style="position:relative">
            <input
              type=${show?"text":"password"}
              value=${senha}
              onChange=${e=>{ setSenha(e.target.value); setErro(false); }}
              onKeyDown=${onKey}
              placeholder="Digite a senha..."
              autofocus
              style=${"width:100%;padding:11px 40px 11px 14px;background:#F7F9FC;border:1px solid "+(erro?"#F73A60":"#E8ECF1")+";border-radius:10px;color:#1C1C1C;font-size:13px;outline:none;box-sizing:border-box;transition:border-color .15s"} />
            <button onClick=${()=>setShow(p=>!p)}
              style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#9193A0;padding:2px;display:flex;align-items:center">
              ${show
                ? html`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
                : html`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`}
            </button>
          </div>
          ${erro ? html`<p style="color:#F73A60;font-size:11px;font-weight:600;margin:6px 0 0">Senha incorreta. Tente novamente.</p>` : null}
        </div>

        <button onClick=${tentar} disabled=${loading||!senha.trim()}
          style=${"width:100%;padding:12px;border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .15s;"+(senha.trim()&&!loading?"background:#009FCF;color:#fff;box-shadow:0 4px 16px rgba(0,159,207,0.3)":"background:#F1F5F9;color:#C0C4CC;cursor:not-allowed")}>
          ${loading ? "Verificando…" : "Entrar"}
        </button>
      </div>
    </div>`;
}

function Root() {
  const [authed, setAuthed] = useState(!!sessionStorage.getItem("painel_auth"));
  if (!authed) return html`<${LoginGate} onAuth=${()=>setAuthed(true)} />`;
  return html`<${App} />`;
}

render(html`<${Root} />`, document.getElementById("root"));
</script>
</body>
</html>
