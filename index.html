/* ─── GANTT VIEW ─────────────────────────────────────────── */
function GanttView({ iniciativas, onAbrirProjeto }) {
  const [zoom,       setZoom]       = useState("semanas");
  const [expandidos, setExpandidos] = useState({}); // {id: true/false}
  const [hoje] = useState(()=>{ const d=new Date(); d.setHours(0,0,0,0); return d; });

  const toggle = (id) => setExpandidos(p=>({...p,[id]:!p[id]}));

  /* projetos com atividades que têm prazo */
  const projetos = useMemo(()=>{
    return iniciativas
      .filter(i => i.planejamento?.some(e=>e.prazo))
      .map(i => {
        const nome = i.declaracao_visao?.titulo?.trim() || i.problema?.substring(0,55) || "#"+String(i.num).padStart(2,"0");
        const etapas = (i.planejamento||[])
          .filter(e=>e.prazo)
          .map(e=>({ ...e, prazoDate: new Date(e.prazo+"T00:00:00") }))
          .sort((a,b)=>a.prazoDate-b.prazoDate);
        const inicio = etapas[0]?.prazoDate || hoje;
        const fim    = etapas[etapas.length-1]?.prazoDate || hoje;
        return { id:i.id, nome, area:i.area, etapas, inicio, fim, num:i.num };
      })
      .sort((a,b)=>a.inicio-b.inicio);
  },[iniciativas]);

  /* intervalo global da timeline */
  const { tStart, tEnd, colunas } = useMemo(()=>{
    if (!projetos.length) return { tStart:hoje, tEnd:hoje, colunas:[] };
    const allDates = projetos.flatMap(p=>p.etapas.map(e=>e.prazoDate));
    const minD = new Date(Math.min(...allDates, hoje));
    const maxD = new Date(Math.max(...allDates));
    let tS = new Date(minD); tS.setDate(1);
    let tE = new Date(maxD); tE.setDate(1); tE.setMonth(tE.getMonth()+2);
    const cols = [];
    if (zoom==="semanas") {
      const cur = new Date(tS); cur.setDate(cur.getDate()-cur.getDay());
      while (cur<=tE) { cols.push(new Date(cur)); cur.setDate(cur.getDate()+7); }
    } else {
      const cur = new Date(tS);
      while (cur<=tE) { cols.push(new Date(cur)); cur.setMonth(cur.getMonth()+1); }
    }
    return { tStart:tS, tEnd:tE, colunas:cols };
  },[projetos, zoom, hoje]);

  const colW      = zoom==="semanas" ? 56 : 80;
  const rowH      = 36;
  const labelW    = 240;
  const timelineW = colunas.length * colW;

  const pos = (date) => {
    const total = tEnd - tStart;
    if (total<=0) return 0;
    return Math.max(0, Math.min(1, (new Date(date) - tStart) / total));
  };

  const hojeX    = pos(hoje) * timelineW;
  const STA_CLR  = { "Concluído":"#00BE8C", "Em andamento":"#F5BC50", "A fazer":"#C0C4CC" };
  const AREA_CLR = ["#009FCF","#00BE8C","#F73A60","#F5BC50","#8B5CF6","#EC4899","#F97316","#14B8A6"];
  const aClr     = (a) => AREA_CLR[["Atendimento","Producao","Comercial","Financeiro","RH","CL","TI","Marketing"].indexOf(a)%AREA_CLR.length]||"#009FCF";

  if (!projetos.length) return html`
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:64px;color:#9193A0;flex:1;background:#F7F9FC">
      <p style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:16px;color:#4A4A4A;margin-bottom:6px">Nenhum projeto com atividades e prazos</p>
      <p style="font-size:13px">Abra um projeto → aba Planejamento → adicione etapas com prazo definido.</p>
    </div>`;

  return html`
    <div style="display:flex;flex-direction:column;flex:1;background:#F7F9FC;overflow:hidden;min-height:0">

      <!-- sub-header -->
      <div style="background:#fff;border-bottom:1px solid #E8ECF1;padding:10px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;flex-shrink:0">
        <p style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:13px;color:#1C1C1C;margin:0">
          Evolução de Projetos · ${projetos.length} projeto${projetos.length!==1?"s":""}
        </p>
        <!-- expand / collapse all -->
        <button onClick=${()=>setExpandidos(Object.fromEntries(projetos.map(p=>[p.id,true])))}
          style="font-size:11px;font-weight:600;color:#009FCF;background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:6px;font-family:'Plus Jakarta Sans',sans-serif">
          Expandir todos
        </button>
        <button onClick=${()=>setExpandidos({})}
          style="font-size:11px;font-weight:600;color:#9193A0;background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:6px;font-family:'Plus Jakarta Sans',sans-serif">
          Recolher todos
        </button>
        <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
          <!-- legenda -->
          <div style="display:flex;gap:10px;align-items:center">
            ${[["Concluído","#00BE8C"],["Em andamento","#F5BC50"],["A fazer","#C0C4CC"],["Atrasada","#F73A60"]].map(([l,c])=>html`
              <div key=${l} style="display:flex;align-items:center;gap:4px">
                <span style=${"width:10px;height:10px;border-radius:2px;background:"+c+";display:inline-block"}></span>
                <span style="font-size:10px;color:#9193A0">${l}</span>
              </div>`)}
            <div style="display:flex;align-items:center;gap:4px">
              <span style="width:2px;height:12px;background:#F73A60;display:inline-block;border-radius:1px"></span>
              <span style="font-size:10px;color:#9193A0">Hoje</span>
            </div>
          </div>
          <!-- zoom -->
          <div style="display:flex;background:#F7F9FC;border:1px solid #E8ECF1;border-radius:8px;overflow:hidden">
            ${[["semanas","Semanas"],["meses","Meses"]].map(([z,lbl])=>html`
              <button key=${z} onClick=${()=>setZoom(z)}
                style=${"padding:5px 12px;border:none;cursor:pointer;font-size:11px;font-weight:700;font-family:'Plus Jakarta Sans',sans-serif;transition:all .15s;"+(zoom===z?"background:#009FCF;color:#fff":"background:transparent;color:#9193A0")}>
                ${lbl}
              </button>`)}
          </div>
        </div>
      </div>

      <!-- gantt body com scroll -->
      <div style="flex:1;overflow:auto;min-height:0">
        <div style=${"display:flex;min-width:"+(labelW+timelineW)+"px;min-height:100%"}>

          <!-- COLUNA LABELS (sticky left via position:sticky) -->
          <div style=${"flex-shrink:0;width:"+labelW+"px;position:sticky;left:0;background:#fff;border-right:2px solid #E8ECF1;z-index:3"}>
            <!-- header vazio alinhado com colunas de tempo -->
            <div style="height:40px;background:#F7F9FC;border-bottom:2px solid #E8ECF1"></div>

            ${projetos.map(p=>{
              const exp  = !!expandidos[p.id];
              const done = p.etapas.filter(e=>e.status==="Concluído").length;
              const pct  = p.etapas.length ? Math.round(done/p.etapas.length*100) : 0;
              const ac   = aClr(p.area);
              const atrasadas = p.etapas.filter(e=>{ const h=new Date(); h.setHours(0,0,0,0); return e.prazoDate<h && e.status!=="Concluído"; }).length;
              return html`
                <div key=${p.id}>
                  <!-- LINHA PAI -->
                  <div style=${"height:"+rowH+"px;display:flex;align-items:center;padding:0 10px;gap:6px;background:#F7F9FC;border-bottom:1px solid #E8ECF1;cursor:pointer;transition:background .1s"}
                    onMouseEnter=${e=>e.currentTarget.style.background="#EFF8FF"}
                    onMouseLeave=${e=>e.currentTarget.style.background="#F7F9FC"}>
                    <!-- seta expandir/recolher -->
                    <button onClick=${(e)=>{ e.stopPropagation(); toggle(p.id); }}
                      style="background:none;border:none;cursor:pointer;padding:2px;flex-shrink:0;display:flex;align-items:center;color:#9193A0;transition:transform .2s;transform:${exp?'rotate(90deg)':'rotate(0deg)'}">
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                    </button>
                    <!-- ponto de cor da área -->
                    <span style=${"width:8px;height:8px;border-radius:50%;background:"+ac+";display:inline-block;flex-shrink:0"}></span>
                    <!-- nome do projeto (clicável para abrir modal) -->
                    <span onClick=${(e)=>{ e.stopPropagation(); onAbrirProjeto(p.id); }}
                      style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:11px;color:#1C1C1C;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer"
                      onMouseEnter=${e=>e.target.style.color="#009FCF"}
                      onMouseLeave=${e=>e.target.style.color="#1C1C1C"}>
                      ${p.nome}
                    </span>
                    <!-- badges -->
                    <span style="font-size:9px;font-weight:700;color:#fff;background:#009FCF;padding:1px 5px;border-radius:999px;flex-shrink:0">${pct}%</span>
                    ${atrasadas ? html`<span style="font-size:9px;font-weight:700;color:#F73A60;background:#FEE8ED;padding:1px 5px;border-radius:999px;flex-shrink:0">⚠${atrasadas}</span>` : null}
                  </div>

                  <!-- LINHAS FILHO (etapas) -->
                  ${exp ? p.etapas.map((e,idx)=>html`
                    <div key=${e.id} style=${"height:"+rowH+"px;display:flex;align-items:center;padding:0 10px 0 32px;border-bottom:1px solid #F1F5F9;background:#fff;gap:6px"}>
                      <!-- linha vertical de conexão pai→filho -->
                      <div style="position:relative;flex-shrink:0">
                        <div style=${"position:absolute;left:-16px;top:0;width:1px;height:"+(idx<p.etapas.length-1?"100%":"50%")+";background:#E8ECF1"}></div>
                        <div style="position:absolute;left:-16px;top:50%;width:10px;height:1px;background:#E8ECF1"></div>
                      </div>
                      <!-- ícone de status -->
                      <span style=${"width:8px;height:8px;border-radius:50%;background:"+(STA_CLR[e.status]||"#C0C4CC")+";display:inline-block;flex-shrink:0"}></span>
                      <!-- nome da etapa -->
                      <span style=${"font-size:11px;color:"+(e.status==="Concluído"?"#9193A0":"#4A4A4A")+";white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-decoration:"+(e.status==="Concluído"?"line-through":"none")+";flex:1"}>
                        ${e.titulo}
                      </span>
                      ${e.responsavel ? html`<span style="font-size:9px;color:#9193A0;white-space:nowrap;flex-shrink:0">👤 ${e.responsavel.split(" ")[0]}</span>` : null}
                    </div>`) : null}
                </div>`;
            })}
          </div>

          <!-- ÁREA DA TIMELINE -->
          <div style="flex:1;position:relative;overflow:visible">
            <!-- header de tempo (sticky top) -->
            <div style=${"display:flex;height:40px;border-bottom:2px solid #E8ECF1;background:#F7F9FC;position:sticky;top:0;z-index:2"}>
              ${colunas.map((c,idx)=>{
                const isHoje = zoom==="semanas"
                  ? c<=hoje && new Date(c.getTime()+7*86400000)>hoje
                  : c.getMonth()===hoje.getMonth() && c.getFullYear()===hoje.getFullYear();
                return html`
                  <div key=${idx} style=${"flex-shrink:0;width:"+colW+"px;border-right:1px solid #E8ECF1;display:flex;align-items:center;justify-content:center;background:"+(isHoje?"#FFF3F3":"#F7F9FC")}>
                    <span style=${"font-size:10px;font-weight:"+(isHoje?"700":"500")+";color:"+(isHoje?"#F73A60":"#9193A0")+";font-family:'Plus Jakarta Sans',sans-serif;white-space:nowrap"}>
                      ${zoom==="semanas"
                        ? c.toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"})
                        : c.toLocaleDateString("pt-BR",{month:"short",year:"2-digit"})}
                    </span>
                  </div>`;
              })}
            </div>

            <!-- linhas do gantt -->
            <div style="position:relative">
              <!-- linha vertical de hoje (sobre tudo) -->
              <div style=${"position:absolute;left:"+hojeX+"px;top:0;bottom:0;width:2px;background:#F73A60;opacity:.6;pointer-events:none;z-index:2"}></div>

              ${projetos.map(p=>{
                const exp  = !!expandidos[p.id];
                const ac   = aClr(p.area);
                const done = p.etapas.filter(e=>e.status==="Concluído").length;
                const pct  = p.etapas.length ? done/p.etapas.length : 0;
                const pLeft  = pos(p.inicio)*timelineW;
                const pRight = pos(p.fim)*timelineW;
                const pW     = Math.max(pRight-pLeft, 8);
                return html`
                  <div key=${p.id}>
                    <!-- LINHA PAI na timeline -->
                    <div style=${"height:"+rowH+"px;border-bottom:1px solid #E8ECF1;background:#F7F9FC;position:relative"}>
                      <!-- barra de progresso do projeto -->
                      <div style=${"position:absolute;top:50%;transform:translateY(-50%);left:"+pLeft+"px;width:"+pW+"px;height:14px;border-radius:6px;background:"+ac+"22;border:1.5px solid "+ac+";overflow:hidden"}>
                        <div style=${"height:100%;background:"+ac+"55;width:"+(pct*100)+"%"}></div>
                      </div>
                    </div>

                    <!-- LINHAS FILHO na timeline -->
                    ${exp ? p.etapas.map(e=>{
                      const clr  = STA_CLR[e.status]||STA_CLR["A fazer"];
                      const h2   = new Date(); h2.setHours(0,0,0,0);
                      const atras = e.prazoDate<h2 && e.status!=="Concluído";
                      const bclr  = atras?"#F73A60":clr;
                      const x     = pos(e.prazoDate)*timelineW;
                      const bW    = Math.max(colW*0.65, 8);
                      return html`
                        <div key=${e.id} style=${"height:"+rowH+"px;border-bottom:1px solid #F1F5F9;background:#fff;position:relative"}>
                          <!-- losango / marcador de prazo -->
                          <div title=${e.titulo+" — "+new Date(e.prazo+"T00:00:00").toLocaleDateString("pt-BR")+(e.responsavel?" · "+e.responsavel:"")}
                            style=${"position:absolute;top:50%;transform:translate(-50%,-50%) rotate(45deg);left:"+x+"px;width:12px;height:12px;background:"+(atras?"#FEE8ED":bclr+"33")+";border:2px solid "+bclr+";cursor:pointer;transition:transform .15s"}
                            onMouseEnter=${ev=>ev.currentTarget.style.transform="translate(-50%,-50%) rotate(45deg) scale(1.4)"}
                            onMouseLeave=${ev=>ev.currentTarget.style.transform="translate(-50%,-50%) rotate(45deg) scale(1)"}>
                          </div>
                          <!-- label de prazo (aparece ao lado do losango se houver espaço) -->
                          <span style=${"position:absolute;top:50%;transform:translateY(-50%);left:"+(x+12)+"px;font-size:9px;color:"+bclr+";font-weight:600;white-space:nowrap;pointer-events:none;"+(atras?"opacity:1":"opacity:.7")}>
                            ${new Date(e.prazo+"T00:00:00").toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"})}
                          </span>
                        </div>`;
                    }) : null}
                  </div>`;
              })}
            </div>
          </div>
        </div>
      </div>
    </div>`;
}

/* ─── ATIVIDADES VIEW ────────────────────────────────────── */
function AtividadesView({ iniciativas, onAbrirProjeto, onToggleEtapa }) {
  const [modo,       setModo]       = useState("membro"); // "membro" | "projeto" | "prazo"
  const [filtroSta,  setFiltroSta]  = useState("");
  const [filtroResp, setFiltroResp] = useState("");

  /* coletar todas as etapas de todas as iniciativas que têm planejamento */
  const todasEtapas = useMemo(() => {
    const lista = [];
    iniciativas.forEach(ini => {
      if (!ini.planejamento?.length) return;
      const nomeProj = ini.declaracao_visao?.titulo?.trim() || ini.problema?.substring(0,60) || "#"+String(ini.num).padStart(2,"0");
      ini.planejamento.forEach(e => {
        const hoje = new Date(); hoje.setHours(0,0,0,0);
        const prazoDate = e.prazo ? new Date(e.prazo+"T00:00:00") : null;
        const atrasado  = prazoDate && e.status !== "Concluído" && prazoDate < hoje;
        const proximosDias = prazoDate ? Math.ceil((prazoDate - hoje) / 86400000) : null;
        lista.push({
          ...e,
          iniciativa_id:  ini.id,
          iniciativa_num: ini.num,
          nome_projeto:   nomeProj,
          area:           ini.area,
          atrasado,
          prazoDate,
          proximosDias,
        });
      });
    });
    return lista;
  }, [iniciativas]);

  /* responsáveis únicos */
  const responsaveis = useMemo(() =>
    [...new Set(todasEtapas.map(e=>e.responsavel).filter(Boolean))].sort()
  , [todasEtapas]);

  /* aplicar filtros */
  const filtradas = useMemo(() => todasEtapas.filter(e => {
    if (filtroResp && e.responsavel !== filtroResp) return false;
    if (filtroSta === "atrasado") return e.atrasado;
    if (filtroSta && e.status !== filtroSta) return false;
    return true;
  }), [todasEtapas, filtroSta, filtroResp]);

  /* estatísticas */
  const stats = useMemo(() => ({
    total:      todasEtapas.length,
    concluidas: todasEtapas.filter(e=>e.status==="Concluído").length,
    andamento:  todasEtapas.filter(e=>e.status==="Em andamento").length,
    atrasadas:  todasEtapas.filter(e=>e.atrasado).length,
    semPrazo:   todasEtapas.filter(e=>!e.prazo && e.status!=="Concluído").length,
  }), [todasEtapas]);

  const prazoLabel = (e) => {
    if (!e.prazo) return html`<span style="color:#C0C4CC;font-size:11px">Sem prazo</span>`;
    const d = new Date(e.prazo+"T00:00:00").toLocaleDateString("pt-BR");
    if (e.status==="Concluído") return html`<span style="color:#00BE8C;font-size:11px">✓ ${d}</span>`;
    if (e.atrasado) return html`<span style="color:#F73A60;font-size:11px;font-weight:700">⚠ ${d} (atrasado)</span>`;
    if (e.proximosDias<=3) return html`<span style="color:#D97706;font-size:11px;font-weight:600">⏰ ${d} (${e.proximosDias}d)</span>`;
    return html`<span style="color:#9193A0;font-size:11px">📅 ${d}</span>`;
  };

  const STA_E = {
    "A fazer":      {bg:"#F1F5F9",color:"#475569",border:"#CBD5E1"},
    "Em andamento": {bg:"#FFFBEB",color:"#D97706",border:"#FDE68A"},
    "Concluído":    {bg:"#EDFCF5",color:"#065F46",border:"#A7F3D0"},
  };

  const EtapaRow = ({e}) => {
    const st = STA_E[e.status]||STA_E["A fazer"];
    return html`
      <div style=${"display:flex;align-items:center;gap:10px;padding:10px 12px;background:#fff;border:1px solid "+(e.atrasado&&e.status!=="Concluído"?"#FECDD3":"#E8ECF1")+";border-left:3px solid "+(e.atrasado&&e.status!=="Concluído"?"#F73A60":e.status==="Concluído"?"#00BE8C":"#E8ECF1")+";border-radius:8px;transition:box-shadow .15s"}
        onMouseEnter=${ev=>ev.currentTarget.style.boxShadow="0 2px 8px rgba(0,0,0,0.06)"}
        onMouseLeave=${ev=>ev.currentTarget.style.boxShadow="none"}>
        <!-- checkbox -->
        <div onClick=${()=>onToggleEtapa(e.iniciativa_id, e.id)}
          style=${"width:14px;height:14px;border-radius:3px;border:2px solid;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;background:"+(e.status==="Concluído"?"#00BE8C":"#fff")+";border-color:"+(e.status==="Concluído"?"#00BE8C":"#CBD5E1")}
          onMouseEnter=${ev=>{ if(e.status!=="Concluído") ev.currentTarget.style.borderColor="#00BE8C"; }}
          onMouseLeave=${ev=>{ if(e.status!=="Concluído") ev.currentTarget.style.borderColor="#CBD5E1"; }}>
          ${e.status==="Concluído"?html`<svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`:null}
        </div>
        <!-- conteúdo -->
        <div style="flex:1;min-width:0">
          <p style=${"font-size:12px;font-weight:600;color:"+(e.status==="Concluído"?"#9193A0":"#1C1C1C")+";text-decoration:"+(e.status==="Concluído"?"line-through":"none")+";margin:0 0 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis"}>${e.titulo}</p>
          <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center">
            ${prazoLabel(e)}
            ${e.origem==="smart-ia"?html`<span style="background:#F5F0FF;color:#6D28D9;border:1px solid #DDD6FE;font-size:9px;font-weight:700;padding:1px 5px;border-radius:999px">✨ IA</span>`:null}
          </div>
        </div>
        <!-- responsável (modo projeto) -->
        ${modo==="projeto"&&e.responsavel?html`
          <span style="font-size:11px;color:#4A4A4A;background:#F7F9FC;border:1px solid #E8ECF1;padding:2px 8px;border-radius:999px;white-space:nowrap;flex-shrink:0">👤 ${e.responsavel}</span>`:null}
        <!-- status pill -->
        <span style=${"font-family:'Plus Jakarta Sans',sans-serif;font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;border:1px solid;white-space:nowrap;flex-shrink:0;background:"+st.bg+";color:"+st.color+";border-color:"+st.border}>
          ${e.status}
        </span>
        <!-- link projeto -->
        <button onClick=${()=>onAbrirProjeto(e.iniciativa_id)}
          title="Abrir projeto"
          style="background:none;border:none;cursor:pointer;color:#C0C4CC;padding:2px;flex-shrink:0"
          onMouseEnter=${ev=>ev.currentTarget.style.color="#009FCF"}
          onMouseLeave=${ev=>ev.currentTarget.style.color="#C0C4CC"}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </button>
      </div>`;
  };

  /* agrupar por membro */
  const gruposMembro = useMemo(() => {
    const map = {};
    filtradas.forEach(e => {
      const key = e.responsavel || "Sem responsável";
      if (!map[key]) map[key] = [];
      map[key].push(e);
    });
    return Object.entries(map).sort(([a],[b])=>a.localeCompare(b)).map(([nome,etapas])=>({nome,etapas}));
  }, [filtradas]);

  /* agrupar por projeto */
  const gruposProjeto = useMemo(() => {
    const map = {};
    filtradas.forEach(e => {
      const key = e.nome_projeto;
      if (!map[key]) map[key] = {nome:key, id:e.iniciativa_id, area:e.area, etapas:[]};
      map[key].etapas.push(e);
    });
    return Object.values(map).sort((a,b)=>a.nome.localeCompare(b.nome));
  }, [filtradas]);

  const pct = (etapas) => {
    if (!etapas.length) return 0;
    return Math.round(etapas.filter(e=>e.status==="Concluído").length/etapas.length*100);
  };

  const GrupoHeader = ({nome, etapas, sub}) => {
    const p = pct(etapas);
    const atrasadasG = etapas.filter(e=>e.atrasado).length;
    return html`
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;padding-bottom:10px;border-bottom:2px solid #F1F5F9">
        <h3 style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:14px;color:#1C1C1C;margin:0">${nome}</h3>
        ${sub?html`<span style="font-size:11px;color:#9193A0;background:#F1F5F9;padding:2px 7px;border-radius:6px">${sub}</span>`:null}
        <span style="font-size:11px;color:#9193A0">${etapas.length} atividade${etapas.length!==1?"s":""}</span>
        ${atrasadasG?html`<span style="font-size:10px;font-weight:700;color:#F73A60;background:#FEE8ED;border:1px solid #FECDD3;padding:2px 7px;border-radius:999px">${atrasadasG} atrasada${atrasadasG!==1?"s":""}</span>`:null}
        <div style="display:flex;align-items:center;gap:6px;margin-left:auto">
          <span style="font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:700;color:#009FCF">${p}%</span>
          <div style="width:60px;height:5px;background:#F1F5F9;border-radius:999px;overflow:hidden">
            <div style=${"height:100%;background:#009FCF;border-radius:999px;width:"+p+"%"}></div>
          </div>
        </div>
      </div>`;
  };

  return html`
    <div style="display:flex;flex-direction:column;gap:0">

      <!-- sub-header da view -->
      <div style="background:#fff;border-bottom:1px solid #E8ECF1;padding:12px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">

        <!-- stat cards inline -->
        <div class="stat-card" style="background:#FFF4ED"><span style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:16px;color:#C2410C">${stats.total}</span><span style="font-size:11px;color:#9193A0">Total</span></div>
        <div class="stat-card" style="background:#EDFCF5"><span style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:16px;color:#065F46">${stats.concluidas}</span><span style="font-size:11px;color:#9193A0">Concluídas</span></div>
        <div class="stat-card" style="background:#FFFBEB"><span style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:16px;color:#D97706">${stats.andamento}</span><span style="font-size:11px;color:#9193A0">Em andamento</span></div>
        <div class="stat-card" style="background:#FEE8ED"><span style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:16px;color:#F73A60">${stats.atrasadas}</span><span style="font-size:11px;color:#9193A0">Atrasadas</span></div>
        ${stats.semPrazo?html`<div class="stat-card"><span style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:16px;color:#9193A0">${stats.semPrazo}</span><span style="font-size:11px;color:#9193A0">Sem prazo</span></div>`:null}

        <div style="margin-left:auto;display:flex;gap:8px;flex-wrap:wrap;align-items:center">
          <!-- filtro status -->
          <select value=${filtroSta} onChange=${e=>setFiltroSta(e.target.value)}
            style="background:#fff;border:1px solid #E8ECF1;color:#4A4A4A;font-size:12px;border-radius:8px;padding:6px 26px 6px 10px;outline:none;cursor:pointer">
            <option value="">Todos os status</option>
            <option value="A fazer">A fazer</option>
            <option value="Em andamento">Em andamento</option>
            <option value="Concluído">Concluído</option>
            <option value="atrasado">⚠ Atrasadas</option>
          </select>
          <!-- filtro responsável -->
          ${responsaveis.length ? html`
            <select value=${filtroResp} onChange=${e=>setFiltroResp(e.target.value)}
              style="background:#fff;border:1px solid #E8ECF1;color:#4A4A4A;font-size:12px;border-radius:8px;padding:6px 26px 6px 10px;outline:none;cursor:pointer">
              <option value="">Todos os membros</option>
              ${responsaveis.map(r=>html`<option key=${r} value=${r}>${r}</option>`)}
            </select>` : null}
          <!-- toggle modo -->
          <div style="display:flex;background:#F7F9FC;border:1px solid #E8ECF1;border-radius:8px;overflow:hidden">
            ${[["membro","👤 Por Membro"],["projeto","📁 Por Projeto"],["prazo","📅 Por Prazo"]].map(([m,lbl])=>html`
              <button key=${m} onClick=${()=>setModo(m)}
                style=${"padding:6px 12px;border:none;cursor:pointer;font-size:11px;font-weight:700;font-family:'Plus Jakarta Sans',sans-serif;transition:all .15s;"+(modo===m?"background:#009FCF;color:#fff":"background:transparent;color:#9193A0")}>
                ${lbl}
              </button>`)}
          </div>
        </div>
      </div>

      <!-- conteúdo -->
      <div style="flex:1;overflow-y:auto;padding:24px">
        ${todasEtapas.length===0 ? html`
          <div style="text-align:center;padding:64px 0;color:#9193A0">
            <p style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:16px;color:#4A4A4A;margin-bottom:6px">Nenhuma atividade cadastrada</p>
            <p style="font-size:13px">Abra um projeto, vá na aba Planejamento e adicione etapas.</p>
          </div>` : filtradas.length===0 ? html`
          <div style="text-align:center;padding:48px 0;color:#9193A0">
            <p style="font-size:13px">Nenhuma atividade com os filtros selecionados.</p>
          </div>` : modo==="membro" ? html`
          <!-- MODO MEMBRO -->
          <div style="display:flex;flex-direction:column;gap:28px">
            ${gruposMembro.map(g=>html`
              <div key=${g.nome}>
                ${GrupoHeader({nome:g.nome, etapas:g.etapas})}
                <div style="display:flex;flex-direction:column;gap:6px">
                  ${g.etapas
                    .sort((a,b)=>{
                      if (a.atrasado&&!b.atrasado) return -1;
                      if (!a.atrasado&&b.atrasado) return 1;
                      if (a.prazoDate&&b.prazoDate) return a.prazoDate-b.prazoDate;
                      if (a.prazoDate) return -1;
                      if (b.prazoDate) return 1;
                      return 0;
                    })
                    .map(e=>html`
                    <div key=${e.id}>
                      <p style="font-size:10px;color:#9193A0;font-weight:600;margin:0 0 3px;letter-spacing:.04em">
                        📁 ${e.nome_projeto}
                        <span style="color:#C0C4CC;font-weight:400"> · ${e.fase||"Fase 1"}</span>
                      </p>
                      ${EtapaRow({e})}
                    </div>`)}
                </div>
              </div>`)}
          </div>` : modo==="projeto" ? html`
          <!-- MODO PROJETO -->
          <div style="display:flex;flex-direction:column;gap:28px">
            ${gruposProjeto.map(g=>html`
              <div key=${g.nome}>
                ${GrupoHeader({nome:g.nome, etapas:g.etapas, sub:g.area})}
                <div style="display:flex;flex-direction:column;gap:6px">
                  ${g.etapas
                    .sort((a,b)=>{
                      if (a.atrasado&&!b.atrasado) return -1;
                      if (!a.atrasado&&b.atrasado) return 1;
                      if (a.prazoDate&&b.prazoDate) return a.prazoDate-b.prazoDate;
                      if (a.prazoDate) return -1;
                      if (b.prazoDate) return 1;
                      return 0;
                    })
                    .map(e=>html`${EtapaRow({e})}`)}
                </div>
              </div>`)}
          </div>` : html`
          <!-- MODO PRAZO -->
          ${(()=>{
            const agora = new Date(); agora.setHours(0,0,0,0);
            const fimSemana = new Date(agora); fimSemana.setDate(agora.getDate()+7);
            const fimProx   = new Date(agora); fimProx.setDate(agora.getDate()+30);

            const bucket = (e) => {
              if (!e.prazoDate || !e.prazo) return "sem";
              if (e.status==="Concluído") return "ok";
              if (e.prazoDate < agora) return "vencidas";
              if (e.prazoDate.getTime()===agora.getTime()) return "hoje";
              if (e.prazoDate <= fimSemana) return "semana";
              if (e.prazoDate <= fimProx) return "proximas";
              return "futuro";
            };

            const grupos = [
              {
                key:"vencidas", label:"⚠ Vencidas",
                cor:"#F73A60", bg:"#FEE8ED", border:"#FECDD3",
                desc:"Atividades com prazo já ultrapassado",
              },
              {
                key:"hoje", label:"🔴 Vencem hoje",
                cor:"#D97706", bg:"#FFFBEB", border:"#FDE68A",
                desc:"Prazo é hoje",
              },
              {
                key:"semana", label:"🟡 Esta semana",
                cor:"#D97706", bg:"#FFFBEB", border:"#FDE68A",
                desc:"Prazo nos próximos 7 dias",
              },
              {
                key:"proximas", label:"🔵 Próximas (até 30 dias)",
                cor:"#0369A1", bg:"#EFF8FF", border:"#BAE6FD",
                desc:"Prazo entre 8 e 30 dias",
              },
              {
                key:"futuro", label:"⚪ Futuras (acima de 30 dias)",
                cor:"#475569", bg:"#F1F5F9", border:"#CBD5E1",
                desc:"Prazo superior a 30 dias",
              },
              {
                key:"sem", label:"— Sem prazo definido",
                cor:"#9193A0", bg:"#F7F9FC", border:"#E8ECF1",
                desc:"Atividades sem data de entrega",
              },
            ];

            return html`
              <div style="display:flex;flex-direction:column;gap:24px">
                ${grupos.map(g=>{
                  const itens = filtradas
                    .filter(e=>bucket(e)===g.key)
                    .sort((a,b)=>{
                      if (a.prazoDate&&b.prazoDate) return a.prazoDate-b.prazoDate;
                      if (a.prazoDate) return -1;
                      if (b.prazoDate) return 1;
                      return 0;
                    });
                  if (!itens.length) return null;
                  return html`
                    <div key=${g.key}>
                      <!-- header do grupo de prazo -->
                      <div style=${"display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:8px 12px;background:"+g.bg+";border:1px solid "+g.border+";border-radius:10px"}>
                        <h3 style=${"font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:13px;color:"+g.cor+";margin:0"}>${g.label}</h3>
                        <span style=${"font-size:11px;color:"+g.cor+";opacity:.7"}>${g.desc}</span>
                        <span style=${"margin-left:auto;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:13px;color:"+g.cor}>${itens.length}</span>
                      </div>
                      <!-- itens -->
                      <div style="display:flex;flex-direction:column;gap:6px">
                        ${itens.map(e=>html`
                          <div key=${e.id}>
                            <div style="display:flex;gap:8px;align-items:center;margin-bottom:3px">
                              <span style="font-size:10px;color:#9193A0;font-weight:600">
                                📁 ${e.nome_projeto}
                              </span>
                              ${e.responsavel?html`<span style="font-size:10px;color:#009FCF;font-weight:600">👤 ${e.responsavel}</span>`:null}
                              <span style="font-size:10px;color:#C0C4CC"> · ${e.fase||"Fase 1"}</span>
                            </div>
                            ${EtapaRow({e})}
                          </div>`)}
                      </div>
                    </div>`;
                })}
              </div>`;
          })()}`}
      </div>
    </div>`;
}

function App() {
  const [iniciativas, setIniciativas] = useState([]);
  const [clusters,    setClusters]    = useState([]);
  const [squads,      setSquads]      = useState([]);
  const [sqModal,     setSqModal]     = useState(false);
  const [membros,     setMembros]     = useState([]);
  const [mbModal,     setMbModal]     = useState(false);
  const [newMb,       setNewMb]       = useState({nome:"",area:AREAS[0],cargo:""});
  const [editingMb,   setEditingMb]   = useState(null);
  const [newSq,       setNewSq]       = useState({nome:"",membros:""});
  const [editingSq,   setEditingSq]   = useState(null); // {id, nome, membros}
  const [loading,     setLoading]     = useState(true);
  const [error,       setError]       = useState(null);
  const [view,        setView]        = useState("lista");
  const [filters,     setFilters]     = useState({area:"",okr:"",classificacao:"",status:"",prioridade:"",cluster:"",squad:""});
  const [groupBy,     setGroupBy]     = useState("");
  const [detailId,    setDetailId]    = useState(null);
  const [detailTab,   setDetailTab]   = useState("iniciativa");
  const [editingInfo, setEditingInfo] = useState(false);
  const [infoForm,    setInfoForm]    = useState({});
  const [cModal,      setCModal]      = useState(false);
  const [newC,        setNewC]        = useState({nome:"",descricao:"",cor:CLR_CLUST[0],prioridade:"Media"});
  const [editingClusterPri,  setEditingClusterPri]  = useState(null);
  const [editingClusterName, setEditingClusterName] = useState(null);
  const [niModal,     setNiModal]     = useState(false);
  const [niSaving,    setNiSaving]    = useState(false);
  const EMPTY_NI = {nome_colaborador:"",area:AREAS[0],problema:"",impacto:"",tempo_manual:"",apoio_ai_lead:"Talvez",tipo:"",classificacao:"Projeto",okr:"OKR 2 Margem",complexidade:3,prioridade:"Alta",status:"Backlog",notas:""};
  const [newNi,       setNewNi]       = useState(EMPTY_NI);
  const [saving,      setSaving]      = useState(null);

  useEffect(()=>{ init(); },[]);

  const init = async () => {
    setLoading(true); setError(null);
    try {
      const [ini,cls,sqs,mbs] = await Promise.all([
        supa("iniciativas?select=*&order=num.asc"),
        supa("clusters?select=*&order=created_at.asc"),
        supa("squads?select=*&order=created_at.asc"),
        supa("membros?select=*&order=nome.asc"),
      ]);
      setClusters(cls||[]);
      setSquads(sqs||[]);
      setMembros(mbs||[]);
      if (!ini || ini.length===0) {
        await supa("iniciativas",{method:"POST",body:SEED,prefer:"return=minimal"});
        const seeded = await supa("iniciativas?select=*&order=num.asc");
        setIniciativas(seeded||[]);
      } else { setIniciativas(ini); }
    } catch(e) { setError(e.message); }
    finally { setLoading(false); }
  };

  const patch = async (id, fields) => {
    setSaving(id);
    try {
      await supa("iniciativas?id=eq."+id, {method:"PATCH",body:fields});
      setIniciativas(p=>p.map(i=>i.id===id?{...i,...fields}:i));
      return true;
    } catch(e) { alert("Erro: "+e.message); return false; }
    finally { setSaving(null); }
  };

  const createIniciativa = async () => {
    if (!newNi.problema.trim() || !newNi.nome_colaborador.trim()) return;
    setNiSaving(true);
    try {
      const nextNum = iniciativas.length > 0 ? Math.max(...iniciativas.map(i=>i.num||0)) + 1 : 1;
      const [created] = await supa("iniciativas",{method:"POST",body:{...newNi,num:nextNum},prefer:"return=representation"});
      setIniciativas(p=>[...p,created]);
      setNiModal(false); setNewNi(EMPTY_NI);
    } catch(e) { alert("Erro ao criar iniciativa: "+e.message); }
    finally { setNiSaving(false); }
  };

  const exportCSV = () => {
    const hdr = ["#","Nome","Area","Classificacao","Tipo","OKR","Complexidade","Prioridade","Status","Tempo Manual","Apoio AI Lead","Cluster","SMART","Plano","Problema"];
    const rows = iniciativas.map(i=>{
      const cl = clusters.find(c=>c.id===i.cluster_id);
      return [i.num,i.nome_colaborador,i.area,i.classificacao,i.tipo,i.okr,i.complexidade,i.prioridade,i.status,i.tempo_manual,i.apoio_ai_lead,cl?.nome||"",i.analise_smart?"Sim":"Nao",i.planejamento?.length||0,'"'+(i.problema||"").replace(/"/g,'""')+'"'].join(",");
    });
    const csv = [hdr.join(","),...rows].join("\n");
    const blob = new Blob([csv],{type:"text/csv;charset=utf-8"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href=url; a.download="iniciativas-ia-etcfilmes.csv";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),3000);
  };

  const patchCluster = async (cid, fields) => {
    try {
      await supa("clusters?id=eq."+cid, {method:"PATCH",body:fields});
      setClusters(p=>p.map(c=>c.id===cid?{...c,...fields}:c));
    } catch(e) { alert("Erro ao atualizar cluster: "+e.message); }
  };

  const createCluster = async () => {
    if (!newC.nome.trim()) return;
    try {
      const [c] = await supa("clusters",{method:"POST",body:newC,prefer:"return=representation"});
      setClusters(p=>[...p,c]); setNewC({nome:"",descricao:"",cor:CLR_CLUST[0],prioridade:"Media"});
    } catch(e) { alert("Erro: "+e.message); }
  };

  const deleteCluster = async (cid) => {
    if (!confirm("Remover cluster? As iniciativas não serão excluídas.")) return;
    try {
      await supa("iniciativas?cluster_id=eq."+cid,{method:"PATCH",body:{cluster_id:null}});
      await supa("clusters?id=eq."+cid,{method:"DELETE"});
      setClusters(p=>p.filter(c=>c.id!==cid));
      setIniciativas(p=>p.map(i=>i.cluster_id===cid?{...i,cluster_id:null}:i));
    } catch(e) { alert("Erro: "+e.message); }
  };

  const createSquad = async () => {
    if (!newSq.nome.trim()) return;
    try {
      const [s] = await supa("squads",{method:"POST",body:newSq,prefer:"return=representation"});
      setSquads(p=>[...p,s]); setNewSq({nome:"",membros:""});
    } catch(e) { alert("Erro: "+e.message); }
  };

  const patchSquad = async (sid, fields) => {
    try {
      await supa("squads?id=eq."+sid,{method:"PATCH",body:fields});
      setSquads(p=>p.map(s=>s.id===sid?{...s,...fields}:s));
      setEditingSq(null);
    } catch(e) { alert("Erro ao atualizar squad: "+e.message); }
  };

  const deleteSquad = async (sid) => {
    if (!confirm("Remover squad? As iniciativas não serão excluídas.")) return;
    try {
      await supa("iniciativas?squad_id=eq."+sid,{method:"PATCH",body:{squad_id:null}});
      await supa("squads?id=eq."+sid,{method:"DELETE"});
      setSquads(p=>p.filter(s=>s.id!==sid));
      setIniciativas(p=>p.map(i=>i.squad_id===sid?{...i,squad_id:null}:i));
    } catch(e) { alert("Erro: "+e.message); }
  };

  const createMembro = async () => {
    if (!newMb.nome.trim()) return;
    try {
      const [m] = await supa("membros",{method:"POST",body:newMb,prefer:"return=representation"});
      setMembros(p=>[...p,m].sort((a,b)=>a.nome.localeCompare(b.nome)));
      setNewMb({nome:"",area:AREAS[0],cargo:""});
    } catch(e) { alert("Erro: "+e.message); }
  };

  const patchMembro = async (mid, fields) => {
    try {
      await supa("membros?id=eq."+mid,{method:"PATCH",body:fields});
      setMembros(p=>p.map(m=>m.id===mid?{...m,...fields}:m).sort((a,b)=>a.nome.localeCompare(b.nome)));
      setEditingMb(null);
    } catch(e) { alert("Erro: "+e.message); }
  };

  const deleteMembro = async (mid) => {
    if (!confirm("Remover membro?")) return;
    try {
      await supa("membros?id=eq."+mid,{method:"DELETE"});
      setMembros(p=>p.filter(m=>m.id!==mid));
    } catch(e) { alert("Erro: "+e.message); }
  };

  const getCluster = (id) => clusters.find(c=>c.id===id);
  const getSquad   = (id) => squads.find(s=>s.id===id);
  const detail = detailId ? iniciativas.find(i=>i.id===detailId)||null : null;

  const filtered = useMemo(()=>iniciativas.filter(i=>{
    if (filters.area          && i.area!==filters.area)                      return false;
    if (filters.okr           && i.okr!==filters.okr)                        return false;
    if (filters.classificacao && i.classificacao!==filters.classificacao)    return false;
    if (filters.status        && i.status!==filters.status)                  return false;
    if (filters.prioridade    && i.prioridade!==filters.prioridade)          return false;
    if (filters.cluster==="__none__" && i.cluster_id)                        return false;
    if (filters.cluster && filters.cluster!=="__none__" && i.cluster_id!==filters.cluster) return false;
    if (filters.squad==="__none__"  && i.squad_id)                           return false;
    if (filters.squad && filters.squad!=="__none__" && i.squad_id!==filters.squad) return false;
    return true;
  }),[iniciativas,filters]);

  const stats = useMemo(()=>({
    projetos:  iniciativas.filter(i=>i.classificacao==="Projeto").length,
    tarefas:   iniciativas.filter(i=>i.classificacao==="Tarefa").length,
    ideias:    iniciativas.filter(i=>i.classificacao==="Ideia").length,
    okr1:      iniciativas.filter(i=>i.okr==="OKR 1 Receita").length,
    okr2:      iniciativas.filter(i=>i.okr==="OKR 2 Margem").length,
    comSmart:  iniciativas.filter(i=>i.analise_smart).length,
    alta:      iniciativas.filter(i=>i.prioridade==="Alta").length,
  }),[iniciativas]);

  /* ── STAT CARD ── */
  const SC = ({n,label,color,bg}) => html`
    <div class="stat-card" style=${"background:"+bg}>
      <span style=${"font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:18px;color:"+color+";line-height:1"}>${n}</span>
      <span style="font-size:11px;color:#9193A0;font-weight:500">${label}</span>
    </div>`;

  /* ── CARD ── */
  const Card = (ini) => {
    const cl = getCluster(ini.cluster_id);
    const sq = getSquad(ini.squad_id);
    const cs = CLF[ini.classificacao]  || CLF.Projeto;
    const os = OKR[ini.okr]            || OKR.Transversal;
    const ss = STA[ini.status]         || STA.Backlog;
    const etapas    = ini.planejamento || [];
    const concluidas = etapas.filter(e=>e.status==="Concluído").length;
    return html`
      <div class="card" style=${cl ? "border-left:3px solid "+cl.cor : ""}
        onClick=${()=>{ setDetailId(ini.id); setDetailTab("iniciativa"); }}>
        <div class="flex items-start justify-between gap-2">
          <div class="flex items-center gap-1.5">
            <span class="text-xs font-mono font-bold" style="color:#9193A0">#${String(ini.num).padStart(2,"0")}</span>
            ${ini.analise_smart ? html`<span class="pill" style="background:#F5F0FF;color:#6D28D9;border-color:#DDD6FE;font-size:9px">✨ SMART</span>` : null}
          </div>
          <div class="flex flex-wrap gap-1 justify-end">
            ${Pill({text:ini.classificacao, s:cs})}
            ${Pill({text:ini.okr==="OKR 1 Receita"?"OKR 1":ini.okr==="OKR 2 Margem"?"OKR 2":"Trans.", s:os})}
          </div>
        </div>
        <p class="text-xs leading-relaxed lc3" style="color:#1C1C1C">${ini.problema}</p>
        <div class="flex items-center justify-between pt-2" style="border-top:1px solid #F1F5F9">
          <div class="flex items-center gap-2">
            <span class="text-xs font-medium px-1.5 py-0.5 rounded" style="background:#F1F5F9;color:#9193A0;font-size:10px">${ini.area}</span>
            ${Dot(ini.complexidade)}
          </div>
          ${Pill({text:ini.status, s:ss})}
        </div>
        ${etapas.length > 0 ? html`
          <div style="display:flex;align-items:center;gap:6px">
            <div style="flex:1;height:4px;background:#F1F5F9;border-radius:999px;overflow:hidden">
              <div style=${"height:100%;background:#009FCF;border-radius:999px;width:"+Math.round(concluidas/etapas.length*100)+"%"}></div>
            </div>
            <span style="font-size:10px;color:#9193A0;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600">${concluidas}/${etapas.length}</span>
          </div>` : null}
        <div class="flex items-center gap-3" style="flex-wrap:wrap">
          ${cl ? html`
            <div class="flex items-center gap-1">
              <span class="rounded-full" style=${"width:6px;height:6px;background:"+cl.cor+";display:inline-block;flex-shrink:0"}></span>
              <span class="text-xs lc1" style="color:#9193A0">${cl.nome}</span>
            </div>` : null}
          ${sq ? html`
            <div class="flex items-center gap-1">
              <span style="font-size:10px">👥</span>
              <span class="text-xs" style="color:#009FCF;font-weight:600">${sq.nome}</span>
            </div>` : null}
        </div>
        <p class="text-xs" style="color:#C0C4CC">${(ini.nome_colaborador||"").split(" ").slice(0,2).join(" ")}</p>
      </div>`;
  };

  const ChoiceRow = ({opts,val,styleMap,onPick}) => html`
    <div class="flex flex-wrap gap-2">
      ${opts.map(o=>{
        const s=styleMap?styleMap[o]:null; const act=val===o;
        return html`
          <button key=${o} class="choice-btn"
            style=${act&&s?"background:"+s.bg+";color:"+s.color+";border-color:"+s.border:act?"background:#E5F6FB;color:#009FCF;border-color:#009FCF":""}
            onClick=${()=>onPick(o)}>${o}</button>`;
      })}
    </div>`;

  const SL = (txt) => html`<p class="section-label">${txt}</p>`;

  /* ── LOADING / ERROR ── */
  if (loading) return html`
    <div class="min-h-screen flex flex-col items-center justify-center gap-4" style="background:#F7F9FC">
      ${IconLoader(32)}
      <p style="color:#9193A0;font-size:13px">Conectando ao Supabase…</p>
    </div>`;

  if (error) return html`
    <div class="min-h-screen flex flex-col items-center justify-center gap-4 p-8" style="background:#F7F9FC">
      <span style="color:#F73A60">${IconAlert(32)}</span>
      <p style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;color:#1C1C1C;font-size:16px">Erro ao conectar ao Supabase</p>
      <p style="color:#9193A0;font-size:13px;text-align:center;max-width:400px">${error}</p>
      <button onClick=${init} style="padding:8px 20px;background:#009FCF;color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-size:13px;font-family:'Plus Jakarta Sans',sans-serif">Tentar novamente</button>
    </div>`;

  return html`
    <div class="min-h-screen flex flex-col" style="background:#F7F9FC">

      <!-- HEADER -->
      <div class="flex items-center justify-between flex-wrap gap-4 px-6 py-4" style="background:#fff;border-bottom:1px solid #E8ECF1">
        <div>
          <div class="flex items-center mb-1">
            ${Dots()}
            <span style="color:#009FCF;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;font-family:'Plus Jakarta Sans',sans-serif">ETC Filmes</span>
          </div>
          <h1 style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:22px;color:#1C1C1C;margin:0 0 2px">Painel de Iniciativas e Projetos</h1>
          <p style="color:#9193A0;font-size:12px;margin:0">${iniciativas.length} iniciativas · ${clusters.length} clusters · ${stats.comSmart} com SMART ✨</p>

                                  style=${"padding:5px 12px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;border:none;transition:all .15s;"+(editingClusterName.nome.trim()?"background:#009FCF;color:#fff":"background:#F1F5F9;color:#C0C4CC;cursor:not-allowed")}>
                                  Salvar</button>
                                <button onClick=${()=>setEditingClusterName(null)} style="padding:5px 12px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;background:#fff;color:#9193A0;border:1px solid #E8ECF1">Cancelar</button>
                              </div>
                            </div>` : null}
                        </div>`; })}
                  </div>
                </div>` : null}
              <button onClick=${createCluster} disabled=${!newC.nome.trim()}
                style=${"width:100%;padding:11px;border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .15s;"+(newC.nome.trim()?"background:#009FCF;color:#fff":"background:#F1F5F9;color:#C0C4CC;cursor:not-allowed")}>
                Criar Cluster
              </button>
            </div>
          </div>
        </div>` : null}
    </div>`;
}

function LoginGate({ onAuth }) {
  const [senha,   setSenha]   = useState("");
  const [erro,    setErro]    = useState(false);
  const [loading, setLoading] = useState(false);
  const [show,    setShow]    = useState(false);

  const tentar = () => {
    if (!senha.trim()) return;
    setLoading(true); setErro(false);
    setTimeout(() => {
      if (senha.trim() === "projetosetcfilmes#2026") {
        sessionStorage.setItem("painel_auth", "1");
        onAuth();
      } else {
        setErro(true);
        setLoading(false);
      }
    }, 400);
  };

  const onKey = (e) => { if (e.key === "Enter") tentar(); };

  return html`
    <div style="min-height:100vh;background:#F7F9FC;display:flex;align-items:center;justify-content:center;padding:24px">
      <div style="background:#fff;border:1px solid #E8ECF1;border-radius:20px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 8px 32px rgba(0,0,0,0.08)">

        <!-- logo / identidade -->
        <div style="text-align:center;margin-bottom:32px">
          <div style="display:inline-flex;gap:5px;align-items:center;margin-bottom:12px">
            ${["#F73A60","#00BE8C","#F5BC50","#009FCF"].map(c=>
              html`<span style=${"width:9px;height:9px;border-radius:50%;background:"+c+";display:inline-block"}></span>`
            )}
          </div>
          <p style="font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#009FCF;margin:0 0 6px">ETC Filmes</p>
          <h1 style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:20px;color:#1C1C1C;margin:0 0 6px">Painel de Iniciativas e Projetos</h1>
          <p style="font-size:12px;color:#9193A0;margin:0">Acesso restrito à equipe ETC</p>
        </div>

        <!-- campo senha -->
        <div style="margin-bottom:12px">
          <label style="color:#9193A0;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;display:block;margin-bottom:6px">Senha de acesso</label>
          <div style="position:relative">
            <input
              type=${show?"text":"password"}
              value=${senha}
              onChange=${e=>{ setSenha(e.target.value); setErro(false); }}
              onKeyDown=${onKey}
              placeholder="Digite a senha..."
              autofocus
              style=${"width:100%;padding:11px 40px 11px 14px;background:#F7F9FC;border:1px solid "+(erro?"#F73A60":"#E8ECF1")+";border-radius:10px;color:#1C1C1C;font-size:13px;outline:none;box-sizing:border-box;transition:border-color .15s"} />
            <button onClick=${()=>setShow(p=>!p)}
              style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#9193A0;padding:2px;display:flex;align-items:center">
              ${show
                ? html`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
                : html`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`}
            </button>
          </div>
          ${erro ? html`<p style="color:#F73A60;font-size:11px;font-weight:600;margin:6px 0 0">Senha incorreta. Tente novamente.</p>` : null}
        </div>

        <button onClick=${tentar} disabled=${loading||!senha.trim()}
          style=${"width:100%;padding:12px;border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .15s;"+(senha.trim()&&!loading?"background:#009FCF;color:#fff;box-shadow:0 4px 16px rgba(0,159,207,0.3)":"background:#F1F5F9;color:#C0C4CC;cursor:not-allowed")}>
          ${loading ? "Verificando…" : "Entrar"}
        </button>
      </div>
    </div>`;
}

function Root() {
  const [authed, setAuthed] = useState(!!sessionStorage.getItem("painel_auth"));
  if (!authed) return html`<${LoginGate} onAuth=${()=>setAuthed(true)} />`;
  return html`<${App} />`;
}

render(html`<${Root} />`, document.getElementById("root"));
</script>
</body>
</html>
