/* ── PARSER ── */
const parseAnalise = (txt) => {
  const s = {};
  const sec = (from,to) => {
    const re=new RegExp("## "+from+"\\.(.*?)(?=\\n## "+to+"\\.|$)","s");
    const m=txt.match(re); if(!m) return "";
    return m[0].replace(new RegExp("^## "+from+"\\..*\\n"),"").trim();
  };
  const r1=sec("1","2");
  s.ideiaFrase   =(r1.match(/\*\*Ideia em 1 frase:\*\* (.+)/)||[])[1]||"";
  s.viabilidade  =(r1.match(/\*\*Viabilidade:\*\* ([^-\n]+)/)||[])[1]?.trim()||"";
  s.complexidade =(r1.match(/\*\*Complexidade:\*\* (.+)/)||[])[1]||"";
  s.tempo        =(r1.match(/\*\*Tempo estimado:\*\* (.+)/)||[])[1]||"";
  s.custo        =(r1.match(/\*\*Custo estimado:\*\* (.+)/)||[])[1]||"";
  s.roi          =(r1.match(/\*\*ROI esperado:\*\* (.+)/)||[])[1]||"";
  const r2=sec("2","3");
  s.okrImpactado =(r2.match(/\*\*OKR impactado:\*\* (.+)/)||[])[1]||"";
  s.okrConexao   =(r2.match(/\*\*Conex[aã]o:\*\* (.+)/)||[])[1]||"";
  s.okrImpacto   =(r2.match(/\*\*Impacto estimado:\*\* (.+)/)||[])[1]||"";
  s.okrPrioridade=(r2.match(/\*\*Prioridade sugerida:\*\* (.+)/)||[])[1]||"";
  s.problema=sec("3","4"); s.solucao=sec("4","5"); s.stack=sec("5","6");
  s.roadmap=sec("6","7"); s.estimativas=sec("7","8"); s.riscos=sec("8","9");
  const m9=txt.match(/## 9\.([\s\S]*?)(?=### RECOMENDA|$)/);
  s.proximosPassos=m9?m9[1].trim():"";
  s.recomendacao=(txt.match(/### RECOMENDA[CÇ][AÃ]O FINAL\s*\*\*(.+?)\*\*/)||[])[1]||"";
  s.recomendacaoDesc=(txt.match(/### RECOMENDA[CÇ][AÃ]O FINAL\s*\*\*.+?\*\* - (.+)/)||[])[1]||"";
  const fm=txt.match(/### RESUMO PARA SUBMISS[AÃ]O AO FORMS\n([\s\S]+)$/);
  s.resumoForms=fm?fm[1].trim():((txt.match(/(IDEIA:[\s\S]+RECOMENDA[CÇ][AÃ]O DA SKILL:.+)/)||[])[1]||"");
  return s;
};

/* ── SUPABASE ── */
const supa = async (path,opts={}) => {
  const {method="GET",body,prefer}=opts;
  const headers={"apikey":SKEY,"Authorization":"Bearer "+SKEY,"Content-Type":"application/json"};
  if(prefer) headers["Prefer"]=prefer;
  const res=await fetch(SURL+"/rest/v1/"+path,{method,headers,body:body?JSON.stringify(body):undefined});
  if(!res.ok){const t=await res.text().catch(()=>res.status.toString());throw new Error(t.substring(0,200));}
  const t=await res.text(); return t?JSON.parse(t):null;
};

              <div>
                <label style="color:'#9193A0';fontSize:'11px';fontWeight:600;letterSpacing:'0.08em';textTransform:'uppercase';display:'block';marginBottom:'6px'">Nome *</label>
                <input type="text" value=${newC.nome} onChange=${e=>setNewC(p=>({...p,nome:e.target.value}))}
                  placeholder="Ex: Ecossistema de Atendimento"
                  style="width:'100%';padding:'10px 14px';background:'#F7F9FC';border:'1px solid #E8ECF1';borderRadius:'10px';color:'#1C1C1C';fontSize:'13px';outline:'none';fontFamily:\"'Inter',sans-serif\";boxSizing:'border-box'" />
              </div>
              <div>
                <label style="color:'#9193A0';fontSize:'11px';fontWeight:600;letterSpacing:'0.08em';textTransform:'uppercase';display:'block';marginBottom:'6px'">Descrição (opcional)</label>
                <input type="text" value=${newC.descricao} onChange=${e=>setNewC(p=>({...p,descricao:e.target.value}))}
                  style="width:'100%';padding:'10px 14px';background:'#F7F9FC';border:'1px solid #E8ECF1';borderRadius:'10px';color:'#1C1C1C';fontSize:'13px';outline:'none';fontFamily:\"'Inter',sans-serif\";boxSizing:'border-box'" />
              </div>
              <div>
                <label style="color:'#9193A0';fontSize:'11px';fontWeight:600;letterSpacing:'0.08em';textTransform:'uppercase';display:'block';marginBottom:'8px'">Cor</label>
                <div style="display:'flex';flexWrap:'wrap';gap:'8px'">
                  ${CLR_CLUST.map(c=>html`
                    <button key=${c} onClick=${()=>setNewC(p=>({...p,cor:c}))}
                      style=${{width:"28px",height:"28px",borderRadius:"50%",background:c,border:newC.cor===c?"3px solid #1C1C1C":"3px solid transparent",cursor:"pointer",transition:"all 0.15s",transform:newC.cor===c?"scale(1.15)":"scale(1)"}}>
                    </button>`)}
                </div>
              </div>
              ${clusters.length>0?html`
                <div>
                  <label style="color:'#9193A0';fontSize:'11px';fontWeight:600;letterSpacing:'0.08em';textTransform:'uppercase';display:'block';marginBottom:'8px'">Clusters existentes</label>
                  <div style="display:'flex';flexDirection:'column';gap:'6px';maxHeight:'112px';overflowY:'auto'">
                    ${clusters.map(c=>html`
                      <div key=${c.id} style="display:'flex';alignItems:'center';gap:'8px';fontSize:'12px';color:'#4A4A4A'">
                        <span style=${{width:"8px",height:"8px",borderRadius:"50%",background:c.cor,display:"inline-block",flexShrink:0}}></span>
                        <span style="flex:1">${c.nome}</span>
                        <span style="color:'#C0C4CC'">${iniciativas.filter(i=>i.cluster_id===c.id).length} ini.</span>
                        <button onClick=${()=>deleteCluster(c.id)} style="background:'none';border:'none';cursor:'pointer';color:'#E8ECF1';padding:'2px'" title="Excluir cluster"
                          onMouseEnter=${e=>e.currentTarget.style.color="#F73A60"}
                          onMouseLeave=${e=>e.currentTarget.style.color="#E8ECF1"}>
                          ${IconX(12)}
                        </button>
                      </div>`)}
                  </div>
                </div>`:null}
              <button onClick=${createCluster} disabled=${!newC.nome.trim()}
                style=${{width:"100%",padding:"11px",background:newC.nome.trim()?"#009FCF":"#F1F5F9",color:newC.nome.trim()?"#fff":"#C0C4CC",border:"none",borderRadius:"12px",fontSize:"13px",fontWeight:700,cursor:newC.nome.trim()?"pointer":"not-allowed",fontFamily:"'Plus Jakarta Sans',sans-serif",transition:"all 0.15s"}}>
                Criar Cluster
              </button>
            </div>
          </div>
        </div>`:null}
    </div>
  `;
}

render(html`<${App} />`, document.getElementById("root"));
</script>
</body>
</html>
